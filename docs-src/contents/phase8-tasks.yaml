phase8_categories:
  A:
    title: Markdown パーサー拡張
    impl_paths:
      - src/reqs_builder/components/preprocess/prose.py
      - src/reqs_builder/components/generator/
    spec: external/normalizer/markdown-parser-spec.md
    tasks:
      A1:
        title: "{#id} 付き見出しの検出"
        note: markdown-it-py の AST 走査
      A2:
        title: セクション本文範囲の切り出し
        note: 次の同レベル以上の {#id} までを本文とする
      A3:
        title: ファイル単位 + セクション単位のダブル出力
        note: 既存の parse_markdown 拡張
      A4:
        title: セクション内見出しレベル正規化
        note: 最小レベルを H1 にシフト
      A5:
        title: ソース内相対リンク → toc 記法への変換
        note: contents_dir 基点パス解決が必要 (B2 と連携)
      A6:
        title: shiftHeadings(n) Jinja2 フィルタ
        note: テンプレート側で使用

  B:
    title: アンカー / リンク解決
    impl_paths:
      - src/reqs_builder/components/generator/
    spec: external/generator/anchor-spec.md
    tasks:
      B1:
        title: views データのラッパーツリー構築
        note: data / parent / class_name フィールド
      B2:
        title: アンカー ID 生成規則
        note: リスト型 {class}.item.{id} / シングルトン {class}
      B3:
        title: アンカー → ラッパーのオンデマンド走査 + キャッシュ
      B4:
        title: link_md Jinja2 フィルタ
      B5:
        title: レンダリング後の toc:id 文字列のリンク URL 置換
        note: prose body 内も含む
      B6:
        title: ラッパーの get_page_url() 実装
        note: C3 と連携

  C:
    title: ページ分割 (paging)
    impl_paths:
      - src/reqs_builder/components/generator/
      - src/reqs_builder/components/generator/section_processor.py
    spec: external/generator/paging-spec.md
    tasks:
      C1:
        title: profilesFile の読み込み・パース
      C2:
        title: paginate 設定の評価
        note: クラスが分割対象か判定
      C3:
        title: パス自動導出
        note: リスト型 {class}/{id}.md / シングルトン {class}.md
      C4:
        title: "{% section %} の振る舞い分岐: 分割 vs インライン展開"
        note: 現在は常に分割。インライン展開モードの新設になる
      C5:
        title: プロファイル別の出力ディレクトリ規約
        note: "{outDir}/{profile}/index.md"
      C6:
        title: 複数プロファイルの並列ビルド

  D:
    title: 参照整合性チェック
    impl_paths:
      - src/reqs_builder/components/preprocess/normalizer.py
      - src/reqs_builder/cli.py
    spec: external/normalizer/schema-spec.md
    tasks:
      D1:
        title: --strict CLI フラグの配線
        note: pipeline 全体に伝播
      D2:
        title: "FK チェック: to: schema_name"
        note: additionalProperties パターンの .id 省略形
      D3:
        title: "FK チェック: to: schema_name.property_name"
        note: 明示プロパティ
      D4:
        title: "FK チェック: from がプロパティ名なし"
        note: 辞書キー自体が FK
      D5:
        title: "type: array スキーマ参照時のプロパティ名必須チェック"
      D6:
        title: 参照先がトップレベルスキーマのみであることの検証
        note: ネストパス禁止
      D7:
        title: 警告レポートを BuildReport に乗せる
        note: エラーではなく warning レベル

  E:
    title: YAML DSL クエリ評価拡充
    impl_paths:
      - src/reqs_builder/components/composer/query.py
      - src/reqs_builder/resources/schemas/
    spec: external/composer/queries-spec.md
    tasks:
      E1:
        title: where 句の仕様詰め + 実装
        note: 式言語にするか、単純な eq のみか
      E2:
        title: sort 句の仕様詰め + 実装
      E3:
        title: join 句の仕様詰め + 実装
        note: 参照整合性 (D) との関係整理
      E4:
        title: QuerySchema を E1〜E3 に合わせて拡張

  F:
    title: メタドキュメンテーション拡張
    impl_paths:
      - src/reqs_builder/resources/
      - src/reqs_builder/components/generator/
    spec: external/app/meta-documentation.md
    tasks:
      F1:
        title: Generator の動的名前引き拡張
        note: 変数で view 名を参照できるようにする (F2/F3 の前提)
      F2:
        title: Table View (実データのテーブル表示)
        note: 前提 F1
      F3:
        title: Query View (クエリ結果の表示)
        note: 前提 F1
      F4:
        title: ER 図テンプレート
        note: 前提 D, E3, Mermaid エスケープ
      F5:
        title: DFD テンプレート
        note: 仕様未着手
      F6:
        title: CRUD マトリクステンプレート
        note: 仕様未着手

  G:
    title: CLI / 設定システム
    impl_paths:
      - src/reqs_builder/cli.py
      - src/reqs_builder/config.py
    spec: external/app/cli-spec.md
    tasks:
      G1:
        title: reqs init コマンド (プロジェクト初期化)
        note: cli-spec.md
      G2:
        title: reqs-builder.config.json 読み込み
        note: config-spec.md
      G3:
        title: render.customServer.command 対応
        note: config-spec.md

  H:
    title: バイナリファイルの取り扱い
    impl_paths:
      - src/reqs_builder/components/preprocess/normalizer.py
      - src/reqs_builder/components/composer/
      - src/reqs_builder/components/generator/
    spec: internal/components/normalizer.md
    tasks:
      H1:
        title: 仕様確定
        note: パス解決 / Composer への受け渡し / テンプレートからの参照方法
      H2:
        title: 実装

  I:
    title: Unique 制約宣言
    impl_paths:
      - src/reqs_builder/components/preprocess/
      - src/reqs_builder/resources/schemas/schema/schema-schema.yaml
    spec: internal/components/normalizer.md
    tasks:
      I1:
        title: 仕様確定
        note: 宣言場所 / 複合キー対応の有無
      I2:
        title: 実装 + チェック
        note: --strict 連動

  J:
    title: プラグインシステム
    impl_paths:
      - src/reqs_builder/
    tasks:
      J1:
        title: 計算機能プラグインの I/F 仕様検討
        note: 入出力 / 登録方法 / Composer か Generator のどこに挿すか
      J2:
        title: サンプル実装で I/F 検証
        note: 例 — ファンクションポイント算出

  K:
    title: MCP サーバ
    impl_paths:
      - src/reqs_builder/mcp/
    spec: external/app/mcp-design.md
    tasks:
      K1:
        title: MCP サーバの骨格
        note: Python MCP SDK 選定 + 配線
      K2:
        title: validate ツール
        note: Normalizer 実行 + 結果返却
      K3:
        title: DSL 仕様の提供
        note: queries-spec を tool description として供出
      K4:
        title: schema + references の要約提供
      K5:
        title: 生成結果の参照ツール
        note: reconcile_dir の Markdown を返す

  L:
    title: dog-fooding リファクタ
    impl_paths:
      - docs-src/contents/
      - docs-src/definition/
    tasks:
      L1:
        title: 構造化データに振り替えられる箇所の棚卸し
      L2:
        title: スキーマ + クエリ + テンプレート群の構築
      L3:
        title: 実施過程で見つかったツールの不足を A〜K にフィードバック

  M:
    title: ハウスキーピング
    impl_paths:
      - src/reqs_builder/components/preprocess/
      - docs-src/contents/internal/
    tasks:
      M1:
        title: components/preprocess/ の命名整合性検討
        note: 仕様の Normalizer / SchemaInspector 分離との対応
