schemas:
  entities:
    type: object
    additionalProperties:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        fields:
          type: object
          additionalProperties:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              pk:
                type: boolean
              fk:
                type: string
            additionalProperties: false
            required: [name, type]
      additionalProperties: false
      required: [name, fields]
