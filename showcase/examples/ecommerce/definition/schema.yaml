type: object
properties:
  entities:
    type: object
    additionalProperties:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        fields:
          type: object
          additionalProperties:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              pk:
                type: boolean
              fk:
                type: string
            additionalProperties: false
            required: [name, type]
      additionalProperties: false
      required: [name, fields]

  relations:
    type: array
    items:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        cardinality:
          type: string
          enum: ["1:1", "1:N", "N:N"]
        description:
          type: string
      additionalProperties: false
      required: [from, to, cardinality]
additionalProperties: false
