# Each entity with its outgoing relations attached as a nested list.
# Exercises the ``join:`` clause (nested attach: 1 row per entity, the
# matched relations live under ``outgoing`` as a list).
entity_relations:
  from: entities
  join:
    to: relations
    on: { left: id, right: from }
    as: outgoing
  select:
    - item: id
    - item: name
    - item: outgoing

# Exercises pre-join ``where:`` — the right entity is filtered before
# the merge, so left rows whose only matches got dropped end up with
# an empty list rather than disappearing.
entity_plural_relations:
  from: entities
  join:
    to: relations
    on: { left: id, right: from }
    where:
      description: { contains: "複数" }
    as: plural_outgoing
  select:
    - item: id
    - item: name
    - item: plural_outgoing

# Exercises inline ``flatten:`` — the joined array is unwound in
# place, yielding 1 row per (entity, outgoing relation) and renaming
# the slot from plural ``outgoing`` to singular ``relation``.
# Entities with no outgoing relation are dropped (inner-join shape).
entity_relation_pairs:
  from: entities
  join:
    to: relations
    on: { left: id, right: from }
    as: outgoing
    flatten: { as: relation }
  select:
    - item: id
    - item: name
    - item: relation

# Exercises ``flatten: { preserve_empty: true }`` — the LEFT-join
# analogue: entities with no outgoing relation survive (without the
# ``relation`` field), so the whole entity list stays visible. The
# ``select:`` clause is omitted because pluck would raise on the
# missing ``relation`` for the unmatched rows.
entity_relation_pairs_all:
  from: entities
  join:
    to: relations
    on: { left: id, right: from }
    as: outgoing
    flatten: { as: relation, preserve_empty: true }
