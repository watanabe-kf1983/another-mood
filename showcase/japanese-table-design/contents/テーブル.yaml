テーブル:
  書籍:
    名前: 書籍
    説明: 店舗で取り扱う書籍のマスタ。1 書籍 1 レコードで、ISBN ごとに 1 行を持つ。
    列:
      - 名前: 書籍ID
        型: VARCHAR(16)
        必須: true
        主キー: true
      - 名前: タイトル
        型: VARCHAR(255)
        必須: true
      - 名前: 著者ID
        型: VARCHAR(16)
        必須: true
        参照:
          テーブル: 著者
          列: 著者ID
      - 名前: 出版社ID
        型: VARCHAR(16)
        必須: true
        参照:
          テーブル: 出版社
          列: 出版社ID
      - 名前: 価格
        型: INTEGER
        必須: true
      - 名前: ISBN
        型: VARCHAR(20)

  著者:
    名前: 著者
    説明: 書籍を執筆した著者のマスタ。同名の著者は便宜上別レコードとして扱う。
    列:
      - 名前: 著者ID
        型: VARCHAR(16)
        必須: true
        主キー: true
      - 名前: 氏名
        型: VARCHAR(120)
        必須: true
      - 名前: 国
        型: VARCHAR(60)

  出版社:
    名前: 出版社
    説明: 書籍を発行した出版社のマスタ。仕入元と必ずしも一致しないが、本設計では同一視する。
    列:
      - 名前: 出版社ID
        型: VARCHAR(16)
        必須: true
        主キー: true
      - 名前: 社名
        型: VARCHAR(120)
        必須: true
      - 名前: 所在地
        型: VARCHAR(255)

  在庫:
    名前: 在庫
    説明: 店舗が現在保有している書籍の在庫数を、書籍ごとに 1 レコードで保持する。
    列:
      - 名前: 在庫ID
        型: VARCHAR(16)
        必須: true
        主キー: true
      - 名前: 書籍ID
        型: VARCHAR(16)
        必須: true
        参照:
          テーブル: 書籍
          列: 書籍ID
      - 名前: 数量
        型: INTEGER
        必須: true
      - 名前: 棚番号
        型: VARCHAR(16)

  仕入:
    名前: 仕入
    説明: 出版社からの書籍仕入実績を 1 仕入 1 レコードで記録する。日次バッチで集計対象になる。
    列:
      - 名前: 仕入ID
        型: VARCHAR(16)
        必須: true
        主キー: true
      - 名前: 書籍ID
        型: VARCHAR(16)
        必須: true
        参照:
          テーブル: 書籍
          列: 書籍ID
      - 名前: 仕入日
        型: DATE
        必須: true
      - 名前: 数量
        型: INTEGER
        必須: true
      - 名前: 単価
        型: INTEGER
        必須: true
