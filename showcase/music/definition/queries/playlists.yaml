# Each playlist-track membership link with its track record attached -
# joins ``tracks`` onto ``playlist_tracks`` so the track title travels
# with the link. Feeds ``playlists_with_tracks`` below (a query-to-query
# reference), sparing the template a per-entry ``node("tracks", ...)``
# re-lookup just to read the title.
playlist_entries:
  from: playlist_tracks
  join:
    to: tracks
    on: { left: track_id, right: id }
    as: track_matches
    flatten: { as: track }
  select:
    - item: playlist_id
    - item: position
    - item: track

# Each playlist with its entries attached as a nested list - exercises a
# two-hop query-to-query chain (``playlist_tracks`` ->
# ``playlist_entries`` -> here). ``join.to:`` names the
# ``playlist_entries`` view, which already carries each entry's track
# record, so the index template neither re-filters ``playlist_tracks`` by
# ``playlist_id`` nor re-looks-up ``tracks`` - it just sorts ``entries``
# by ``position`` and reads ``entry.track.title``.
playlists_with_tracks:
  from: playlists
  join:
    to: playlist_entries
    on: { left: id, right: playlist_id }
    as: entries
  select:
    - item: id
    - item: name
    - item: curator
    - item: description
    - item: entries
