# Each album with its tracks attached as a nested list, plus its optional
# liner-note prose joined in as ``liner`` (a descendant of the album).
# Exercises the ``join:`` list form mixing a nested attach (``tracks``) with
# a ``preserve_empty`` singleton flatten.
album_tracklist:
  from: albums
  join:
    - to: tracks
      on: { left: id, right: album_id }
      as: tracks
    - to: prose
      on: { left: liner_notes, right: id }
      as: liner_matches
      flatten: { as: liner, preserve_empty: true }
  select:
    - item: id
    - item: title
    - item: artist_id
    - item: label_id
    - item: genre_id
    - item: year
    - item: is_live
    - item: cover
    - item: tracks
    - item: liner

# Each track with its album and the album's artist attached - exercises
# the ``join:`` list form (multi-join): the first join brings the album
# in, and the second join uses an attribute introduced by the first
# join's ``flatten: { as: album }`` (``album.artist_id``) as the lookup
# key for the second match.
tracks_with_artist:
  from: tracks
  join:
    - to: albums
      on: { left: album_id, right: id }
      as: album_matches
      flatten: { as: album }
    - to: artists
      on: { left: album.artist_id, right: id }
      as: artist_matches
      flatten: { as: artist }
  select:
    - item: id
    - item: title
    - item: album
    - item: artist
