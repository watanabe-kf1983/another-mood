# Merged with the user's schema.yaml at validation time so that all
# content files are validated uniformly.

title: ContentSchema
description: >-
  Built-in schema that defines the `prose` entity. Markdown files under
  contents_dir are parsed into prose records (id, title, body) and
  validated alongside the user's schema.yaml.

type: object
properties:
  prose:
    title: Prose collection
    description: >-
      Collection of prose records, one per Markdown file in contents_dir.
      Each record carries the file's id, optional title, and parsed body.
    type: array
    items:
      title: Prose record
      description: One Markdown file parsed into an id / title / body triple.
      type: object
      properties:
        id:
          title: Prose id
          description: >-
            Stable identifier derived from the Markdown file's path
            (without extension).
          type: string
        title:
          title: Prose title
          description: >-
            Display title taken from the first H1 heading of the Markdown
            source. Absent when the source has no H1.
          type: string
        order_key:
          title: Prose order key
          description: >-
            Sort key for reading order, derived from the id: sorting prose
            records by this string yields folder pre-order (each folder's
            index first, then its subtree, contiguous).
          type: string
        depth:
          title: Prose outline depth
          description: >-
            Heading depth of the record in the folder outline, derived from
            the id (the root index is 1). A folder's index sits one level
            above its files.
          type: integer
        headings:
          title: Prose headings
          description: >-
            Headings found in the Markdown body, in document order, as
            link-target nodes. Each carries the GitHub-compatible slug of its
            text as `id` (deduplicated within the body), the heading text as
            `title`, and its `level` (1-6). A cross-document link to a heading
            resolves against these.
          type: array
          items:
            title: Prose heading
            description: One heading, a link target within the prose body.
            type: object
            properties:
              id:
                title: Heading id
                description: >-
                  GitHub-compatible slug of the heading text, matching the id
                  the renderer stamps on the heading. Deduplicated within the
                  body by a `-N` suffix.
                type: string
              title:
                title: Heading title
                description: Text of the heading.
                type: string
              level:
                title: Heading level
                description: Heading level, 1 (H1) through 6 (H6).
                type: integer
            required: [id, title, level]
        body:
          title: Prose body
          description: >-
            Body of the Markdown file, carrying its MIME type and the raw
            source text.
          type: object
          properties:
            mime_type:
              title: Body MIME type
              description: MIME type of the body content (currently always `text/markdown`).
              type: string
            content:
              title: Body content
              description: >-
                Markdown source of the file. Relative links to other prose
                documents are normalized to their `node:` form
                (`[t](other.md)` → `[t](node:/prose/<id>)`); the template
                `relink` filter resolves these back to URLs.
              type: string
          required: [mime_type, content]
      required: [id, body]
