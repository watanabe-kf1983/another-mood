title: QuerySchema
description: >-
  Validates user-defined query files under queries_dir. Each
  top-level key names a query (= view) and maps to a definition with a
  required `from:` data source and optional `where:` / `grouped:` /
  `select:` clauses. See docs/reference/query.md for the prose
  specification.

type: object
propertyNames:
  description: >-
    Query name pattern: starts with a Unicode letter or underscore,
    followed by Unicode letters, digits, or underscores.
  pattern: "^[\\p{L}_][\\p{L}\\p{N}_]*$"
additionalProperties:
  title: Query definition
  description: >-
    A single query (view) definition. `from:` selects the normalized
    data source; optional `flatten:` unwinds intrinsic arrays; optional
    `join:` attaches a related entity; optional `where:` filters
    records; optional `grouped:` reshapes them into groups; optional
    `select:` projects output fields. See docs/reference/query.md for
    semantics.
  type: object
  properties:
    from:
      title: Data source
      description: >-
        Id of the entity to read from. Must match a catalog entity id
        verbatim; dots are not a path separator.
      type: string
    flatten:
      title: Flatten clause
      description: >-
        Unwind one or more intrinsic array attributes of each row.
        Accepts three shapes: a bare attribute name (scalar shorthand),
        a single object describing one unwind, or an ordered list of
        either. After flattening, the parent fields stay at the row's
        top level and the array's element fields are nested under the
        `as:` namespace (defaults to `of:` when omitted).
      oneOf:
        - title: Scalar shorthand
          description: >-
            Bare attribute name. Equivalent to `{ of: <name> }` with
            `as:` defaulting to the same name and `preserve_empty: false`.
          type: string
        - $ref: "#/$defs/flattenItem"
        - title: List form
          description: >-
            Ordered list of flatten operations. Each later item observes
            the row shape produced by the earlier ones.
          type: array
          minItems: 1
          items:
            oneOf:
              - type: string
              - $ref: "#/$defs/flattenItem"
    join:
      title: Join clause
      description: >-
        Attach one or more related entities to each row. Accepts a
        single object (one join) or an ordered list of objects
        (multiple joins). Each later list entry observes the row shape
        produced by earlier ones. See `joinItem` for per-key semantics.
      oneOf:
        - $ref: "#/$defs/joinItem"
        - title: List form
          type: array
          minItems: 1
          items:
            $ref: "#/$defs/joinItem"
    where:
      title: Filter clause
      description: >-
        Per-record filter applied between `from:` and `grouped:`. See
        the `whereClause` definition for the recursive grammar.
      $ref: "#/$defs/whereClause"
    grouped:
      title: Grouping clause
      description: >-
        Groups the source records by the value of one field. The output
        becomes an array of groups, each carrying the key value and an
        inner array of the group's members.
      type: object
      properties:
        by:
          title: Group key field
          description: Name of the field whose value defines each group.
          type: string
        as:
          title: Members array name
          description: >-
            Name given to the inner array of group members. Defaults to
            the value of `from:` when omitted.
          type: string
      required: [by]
      additionalProperties: false
    select:
      title: Output projection
      description: >-
        List of fields to include in the output. Fields not listed are
        omitted. A listed field that is absent on a particular record
        is omitted from that record's output (no error, no fabricated
        null) — matching the data model's "nullable = absent key"
        convention. When `select:` itself is omitted, records pass
        through unchanged.
      type: array
      items:
        title: Selected field
        description: >-
          One field to include in the output. `item:` names the source
          field; optional `as:` renames it in the output.
        type: object
        properties:
          item:
            title: Source field name
            description: Name of the field to read from each record.
            type: string
          as:
            title: Output field name
            description: >-
              Name to use in the output. Defaults to the value of `item:`
              when omitted.
            type: string
        required: [item]
        additionalProperties: false
    sort:
      title: Sort clause
      description: >-
        Orders the final output records by one field. Runs after
        `select:`, so `by:` references attribute names in the projected
        output (including any `as:` aliases).
      type: object
      additionalProperties: false
      properties:
        by:
          title: Sort key field
          description: >-
            Name of the field to order by. Records that lack this
            field form the "missing" group placed by `missing:`.
          type: string
        direction:
          title: Sort direction
          description: Ascending (default) or descending.
          type: string
          enum: [asc, desc]
        missing:
          title: Missing-key placement
          description: >-
            Where to place records that lack the `by:` field.
            Independent of `direction:` — `missing: first` always
            places them at the head, `missing: last` at the tail.
            Default `last`.
          type: string
          enum: [first, last]
      required: [by]
  required: [from]
  additionalProperties: false

$defs:
  flattenItem:
    title: Flatten item
    description: >-
      One unwind operation. `of:` names the intrinsic array attribute
      to expand. `as:` renames its element namespace in the output row
      (defaults to `of:`). `preserve_empty: true` keeps parent rows
      whose array is empty or missing (the `as:` field is absent on
      those rows); the default `false` drops them.
    type: object
    properties:
      of:
        title: Source array attribute
        description: >-
          Name of the intrinsic array attribute on the current row to
          unwind.
        type: string
      as:
        title: Output namespace
        description: >-
          Name given to the element namespace on each produced row.
          Defaults to the value of `of:`. Typically set to rename a
          plural array attribute (`tasks`) to its singular form
          (`task`) once each row carries just one element.
        type: string
      preserve_empty:
        title: Keep empty parents
        description: >-
          When `true`, rows whose `of:` array is empty or missing are
          kept (without the `as:` field). Default `false` drops them.
        type: boolean
    required: [of]
    additionalProperties: false

  joinItem:
    title: Join item
    description: >-
      One join operation. Match each current row against the right
      entity (`to:`) where the current row's `on.left:` attribute
      equals the right row's `on.right:` attribute, and attach the
      matches under `as:` (defaults to `to:`).
    type: object
    properties:
      to:
        title: Right entity
        description: Id of the entity to join in.
        type: string
      on:
        title: Join condition
        description: >-
          Match rows where the left side's `left:` attribute equals
          the right side's `right:` attribute. Each path may be a
          dotted attribute on a nested object; array crossings are
          not allowed.
        type: object
        properties:
          left:
            type: string
          right:
            type: string
        required: [left, right]
        additionalProperties: false
      as:
        title: Output namespace
        description: >-
          Name of the nested array attached to each left row. Defaults
          to the value of `to:`.
        type: string
      where:
        title: Pre-join filter
        description: >-
          Per-record predicate applied to the right entity before the
          join. Same grammar as the top-level `where:`. Use this (not
          the top-level `where:`) when right rows need to be dropped
          but the corresponding left rows should be kept (the SQL
          "filter in WHERE after LEFT JOIN turns it into INNER" trap).
        $ref: "#/$defs/whereClause"
      flatten:
        title: Inline post-join flatten
        description: >-
          Unwind the attached `as:` array after the merge so each
          output row carries one matched right record. Object form:
          `as:` renames the post-flatten attribute (default = the
          join's `as:`; typically set to rename a plural like `tasks`
          to its singular `task` once each row carries just one
          element); `preserve_empty: true` keeps left rows with no
          match (the LEFT-join analogue; default `false` drops them).
          Shorthand `true` uses both defaults.
        oneOf:
          - const: true
          - type: object
            properties:
              as:
                title: Post-flatten attribute name
                type: string
              preserve_empty:
                title: Keep unmatched left rows
                type: boolean
            additionalProperties: false
    required: [to, on]
    additionalProperties: false

  whereClause:
    title: Where clause node
    description: >-
      One node in the where-clause tree: a per-field predicate or a
      combinator. Reserved keys `and` / `or` / `not` combine inner
      clauses; every other key is a field name (dotted `key_path`
      supported) whose value is either a scalar (sugar for `eq`) or a
      `predicateBundle`. Multiple top-level keys combine by implicit
      AND.
    type: object
    properties:
      and:
        title: Conjunction
        description: All inner clauses must match.
        type: array
        minItems: 1
        items: { $ref: "#/$defs/whereClause" }
      or:
        title: Disjunction
        description: At least one inner clause must match.
        type: array
        minItems: 1
        items: { $ref: "#/$defs/whereClause" }
      not:
        title: Negation
        description: >-
          Inverts the inner clause. Takes a single `whereClause`; a
          list form is rejected so `!(a∧b)` vs `[¬a, ¬b]` is
          unrepresentable.
        $ref: "#/$defs/whereClause"
    additionalProperties:
      title: Field predicate
      description: >-
        A scalar (sugar for `{ eq: <scalar> }`) or an explicit
        `predicateBundle`.
      oneOf:
        - $ref: "#/$defs/predicateBundle"
        - type: [string, number, integer, boolean]

  predicateBundle:
    title: Predicate bundle
    description: >-
      One or more atomic operators applied to a field. Multiple
      operators combine by implicit AND (`{ gt: 10, lt: 20 }` reads as
      BETWEEN). The closed set of operators is enumerated here; any
      other key is rejected.
    type: object
    minProperties: 1
    properties:
      eq:
        title: Equality
        description: Strict equality (`==` in Python).
      gt:
        title: Greater than
        description: Numeric strict greater than.
        type: number
      gte:
        title: Greater than or equal
        description: Numeric greater than or equal.
        type: number
      lt:
        title: Less than
        description: Numeric strict less than.
        type: number
      lte:
        title: Less than or equal
        description: Numeric less than or equal.
        type: number
      startswith:
        title: String prefix
        description: Record value must start with this string.
        type: string
      endswith:
        title: String suffix
        description: Record value must end with this string.
        type: string
      contains:
        title: Substring
        description: Record value must contain this string.
        type: string
      exists:
        title: Presence
        description: >-
          `true` requires the field to be present; `false` requires it
          to be absent. The only operator that consults presence
          rather than value.
        type: boolean
    additionalProperties: false
