# Catalog of files in this docs/ tree that are exposed as MCP Resources.
#
# Each entry registers one resource at the URI `docs://<path>`.  Markdown
# relative links between resources resolve correctly under that scheme
# per RFC 3986 (e.g. `[query](query.md)` on `docs://reference/cli.md`
# points to `docs://reference/query.md`).
#
# `description` is shown to AI agents in `resources/list` responses, so
# it must be self-contained â€” keep it in sync with the Guides / Reference
# link descriptions in docs/index.md and docs/reference/index.md.
#
# index.md files are deliberately omitted: agents browse via this catalog,
# not by reading hand-written index pages.
resources:
  - path: guides.md
    description: >-
      Walks through concepts, Quick Start, workflow, schema and content,
      queries, and templates in a single file.
  - path: mcp.md
    description: >-
      Install and configure the Another Mood MCP server in coding
      agents (Claude Code, VS Code Copilot Chat); lists the MCP tools
      mirroring the `mood` CLI.
  - path: reference/cli.md
    description: >-
      `mood` command reference (`init` / `build` / `watch` / `blueprint` / `docs`).
  - path: reference/schema.md
    description: >-
      Schema definition reference â€” a JSON Schema subset plus the built-in
      prose and blob schemas.
  - path: reference/query.md
    description: >-
      Query syntax reference â€” `from` / `grouped` / `select`.
  - path: reference/template.md
    description: >-
      Template syntax reference â€” Jinja2 plus the `{% render %}` extension.
  - path: reference/reports.md
    description: >-
      Report output configuration reference â€” `definition/reports.yaml`,
      `file_per:`, and multi-edition (`editions:`) output.
  - path: reference/manifest.md
    description: >-
      Project manifest reference (`sbdb.yaml`) â€” project title and
      version compatibility.
  - path: reference/schemas/content-schema.yaml
    description: >-
      Built-in schema merged with the user's schema.yaml at validation
      time so all content files are validated uniformly.
  - path: reference/schemas/query-schema.yaml
    description: >-
      Schema validating user-defined query files under queries_dir.
  - path: reference/schemas/schema-schema.yaml
    description: >-
      Meta-schema validating the user's schema.yaml â€” defines the
      JSON Schema subset that user schemas may use.
  - path: reference/schemas/reports-schema.yaml
    description: >-
      Schema validating the user's reports.yaml â€” defines
      the form A (file_per) and form B (editions) shapes.
  - path: reference/schemas/manifest-schema.yaml
    description: >-
      Schema validating the project manifest sbdb.yaml â€”
      sbdb_version, title, and the tools.another-mood namespace.
