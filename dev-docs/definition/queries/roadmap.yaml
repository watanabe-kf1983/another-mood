# Tasks regrouped by phase for the roadmap page. Named `roadmap` so the
# rendered page is `roadmap.md` (the page path follows the view name).
# Flattens each category's `tasks`, then groups the flattened tasks by
# phase.
roadmap:
  from: categories
  flatten:
    of: tasks
    as: task
  grouped:
    by: task.phase
    as: tasks
  select:
    - item: task.phase
      as: id
    - item: task.phase
      as: phase
    - item: tasks
