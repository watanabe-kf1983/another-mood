type: object
additionalProperties: false
properties:
  categories:
    type: object
    additionalProperties:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
        impl_paths:
          type: array
          items:
            type: string
        spec:
          type: string
          description: |
            対応する設計仕様 prose ドキュメントの id（contents 相対パス、拡張子なし）。
          x-ref:
            entity: prose
            attribute: id
        tasks:
          type: object
          additionalProperties:
            type: object
            additionalProperties: false
            properties:
              title:
                type: string
              note:
                type: string
              phase:
                type: integer
              done:
                type: boolean
              proposal:
                type: string
                description: |
                  対応する Proposal 節への相対パス + アンカー
                  (例: design/normalizer/normalizer.md#バイナリファイルの正規化-h1-h2)。
                  Proposal が無いタスクでは省略する。
            required: [ title, phase ]
      required: [ title, impl_paths, tasks ]
