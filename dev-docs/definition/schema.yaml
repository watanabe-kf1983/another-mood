type: object
properties:
  categories:
    type: object
    additionalProperties:
      type: object
      properties:
        title:
          type: string
        impl_paths:
          type: array
          items:
            type: string
        spec:
          type: string
        tasks:
          type: object
          additionalProperties:
            type: object
            properties:
              title:
                type: string
              note:
                type: string
              phase:
                type: integer
              done:
                type: boolean
              proposal:
                type: string
                description: |
                  対応する Proposal 節への相対パス + アンカー
                  (例: design/normalizer/normalizer.md#バイナリファイルの正規化-h1-h2)。
                  Proposal が無いタスクでは省略する。
            additionalProperties: false
            required: [ title, phase ]
      additionalProperties: false
      required: [ title, impl_paths, tasks ]
additionalProperties: false
