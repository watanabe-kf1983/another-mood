schemas:
  categories:
    type: object
    additionalProperties:
      type: object
      properties:
        title:
          type: string
        impl_paths:
          type: array
          items:
            type: string
        spec:
          type: string
        tasks:
          type: object
          additionalProperties:
            type: object
            properties:
              title:
                type: string
              note:
                type: string
              phase:
                type: integer
              done:
                type: boolean
            additionalProperties: false
            required: [title, phase]
      additionalProperties: false
      required: [title, impl_paths, tasks]
