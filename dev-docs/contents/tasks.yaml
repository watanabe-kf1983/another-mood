          マージ (半混在状態) がすり抜ける。mood がプロジェクトに書く領域は
          sbdb.yaml / definition/ / contents/ で尽きるので、この 3 つのどれかが
          既に在れば何も書かずにエラーする形へ置換。無関係ファイルの同居許容は維持。
          cargo init は既存 src/ を採用するが、blueprint はサンプルデータなので
          採用の意味論は成立せず拒否が正解。V5 と同根 (管轄領域の原理)。
        phase: 14
