    impl_paths:
      - src/another_mood/components/preprocess/prose.py
      - src/another_mood/components/generator/
    spec: 20-design/50-normalizer/30-markdown-parser-spec
    tasks:
      A1:
        title: 見出し抽出 → prose.headings 生成
        phase: 12
        done: true
      A3:
        title: 見出しノードの anchor_path 構築（#-形）
        phase: 12
        done: true
      A4:
        title: 出力 URL fragment 規則の一般化 + 見出しは stamp しない
        phase: 12
        done: true
      A5:
        title: ソース内相対リンク → node 記法への変換（基本）
        phase: 12
        done: true
      A6:
        title: under_heading フィルタ（見出し深さ調整）
        phase: 11
        done: true
      A7:
        title: "node 記法変換の `#fragment` 対応（見出しリンク）"
        phase: 12
        done: true

  B:
    title: アンカー / リンク解決
    impl_paths:
      - src/another_mood/components/generator/
    spec: 20-design/70-generator/20-anchor-spec
    tasks:
      B1:
        title: 親参照の注入 (`_parent` / `_parent_record`)
        phase: 11
        done: true
      B2:
        title: anchor_path → ノード マップ構築
        phase: 11
        done: true
      B3:
        title: ノードへの `_meta.anchor_path` / `_meta.object_type_id` 注入
        phase: 11
        done: true
      B4:
        title: anchor 解決・整形フィルタ (`anchor` / `link` / `label` / `href`)
        phase: 11
        done: true
      B5:
        title: prose body 処理フィルタ (`relink`)
        phase: 11
        done: true
      B6:
        title: ページパスの導出 (PagingPolicy.page_path)
        phase: 11
        done: true
      B7:
        title: IRI エスケープ関数 (anchor_path / as_url の共通化)
        phase: 11
        done: true
      B8:
        title: リンク語彙の振り直し (anchor → node rename)
        phase: 11
        done: true
      B9:
        title: アンカー発行フィルタ (`| anchor`)
        phase: 11
        done: true
      B10:
        title: 未解決リンク参照のビルドレポート警告 (link / resolve 共通)
        note: >-
          link / href (B4) と resolve (B5) は未解決参照 (MissingNode / 解決できない node: URL) を
          素テキストで可視化するのみで BuildReport には積まない。author が壊れた参照に気づけるよう、
          未解決参照を収集して D7 の警告インフラに載せ、ビルドレポートに出す。両フィルタ共通の経路で
          一度に扱う。現契約 (可視化はするが報告はしない) は anchor-spec.md#未解決参照の扱い。
          現状でも表示テキストは残り可視なので優先度低。
        phase: 15
        proposal: 20-design/70-generator/20-anchor-spec#未解決参照の扱い
      B11:
        title: node() のモード分離（位置=segments escape / path=verbatim を kwarg で surface）
        phase: 11
        done: true
      B12:
        title: mood_view を this の subtree 内に限定（描画はデータ位置に従う）
        phase: 12
        done: true
      B13:
        title: prose 検知の位置独立化（catalog `origin_item_type` による由来判定）
        phase: 13
        done: true

  C:
    title: ページ分割 (paging)
    impl_paths:
      - src/another_mood/components/generator/
      - src/another_mood/components/generator/mood_view_processor.py
    spec: 20-design/70-generator/40-paging-spec
    tasks:
      C1:
        title: reports.yaml の読み込み・パース
        phase: 11
        done: true
      C2:
        title: file_per 設定の評価
        phase: 11
        done: true
      C3:
        title: page_path を実ファイルへ適用
        phase: 11
        done: true
      C4:
        title: "{% mood_view %} の振る舞い分岐: 分割 vs インライン展開"
        phase: 11
        done: true
      C5:
        title: edition 別の出力ディレクトリ規約
        phase: 12
        done: true
      C6:
        title: 複数 edition の並列ビルド
        phase: 12
        done: true
      C7:
        title: FS-safe パス書き出しの堅牢化 (パス長の例外詰め替え + 予約名検査)
        note: >-
          IRI エスケープ (B7) で潰せない、FS 許容名 ≠ ユーザ命名 id の齟齬。loud なパス長超過は
          最外での OSError (ENAMETOOLONG) → UserError 詰め替え。silent な Windows 予約名・末尾ドットは
          共通の ntpath.isreserved 検査 (全 OS 一律 error) を、ユーザ id がパスになる箇所すべて
          (generator ページパス / edition ディレクトリ / composer クエリ結果ファイル) に埋め込む。
          ソースファイル名由来のパスは FS 受理済みで対象外。NFC/NFD は別課題 D10。
        phase: 13
        done: true
      C8:
        title: inline キーワードの廃止
        phase: 11
        done: true
      C9:
        title: mood_view 自動アンカー刻印
        phase: 11
        done: true
      C10:
        title: meta 子テンプレへの root/entities threading 撤去
        phase: 11
        done: true
      C11:
        title: meta 主題の実ノード化 → _split マーカー撤去・page_path 一本化
        phase: 11
        done: true
      C12:
        title: render ループの一般化 (heterogeneous edition kinds を単一ループへ)
        phase: 12
        done: true

  D:
    title: ユーザコンテンツバリデーション
    impl_paths:
      - src/another_mood/components/preprocess/normalizer.py
      - src/another_mood/components/preprocess/schema_inspector.py
      - src/another_mood/components/preprocess/
      - src/another_mood/resources/schemas/schema-schema.yaml
      - src/another_mood/config.py
      - src/another_mood/cli.py
    spec: 20-design/50-normalizer/20-schema-spec
    tasks:
      D1:
        title: Meta-schema 拡張 — x-ref キーワードの受理
        phase: 10
        done: true
      D2:
        title: Schema-Inspector 拡張 — x-ref の収集
        phase: 10
        done: true
      D3:
        title: Schema-level コヒーレンスチェック
        phase: 10
        done: true
      D4:
        title: showcase/music への x-ref 適用
        phase: 10
        done: true
      D5:
        title: docs/reference 同期
        phase: 10
        done: true
      D6:
        title: Data-level FK 整合性検査
        phase: 10
        done: true
      D7:
        title: 警告インフラ
        phase: 10
        done: true
      D8:
        title: Unique 制約の仕様確定
        note: 宣言場所 / 複合キー対応の有無
        phase: 15
        proposal: 20-design/50-normalizer/10-normalizer#unique-制約-d8-d9
      D9:
        title: Unique 制約の実装 + チェック
        note: --strict 連動
        phase: 15
        proposal: 20-design/50-normalizer/10-normalizer#unique-制約-d8-d9
      D10:
        title: 入力境界での一律 NFC 正規化
        note: >-
          macOS が NFC/NFD をファイル名として同一視するため、正規化形だけ異なる id が silent に
          同一出力ファイルへ畳まれる。preprocess の入力境界 2 点 (ファイル内容の decode 直後・
          ディレクトリ走査で得たファイル名) で全テキストを一律 NFC 正規化する。理由は
          source_loader.py の _read_text_nfc docstring を参照。
        phase: 13
        done: true

  E:
    title: YAML DSL クエリ評価拡充
    impl_paths:
      - src/another_mood/components/composer/query.py
      - src/another_mood/resources/schemas/
    spec: 20-design/60-composer/10-queries-spec
    tasks:
      E1:
        title: where 句の仕様詰め + 実装
        phase: 10
        done: true
      E2:
        title: sort 句の仕様詰め + 実装
        phase: 10
        done: true
      E3:
        title: クエリ DSL 拡充後半 (join 句導入 + where 射程統一)
        phase: 10
        done: true
      E6:
        title: クエリ名と正規化済みデータ名の同名禁止チェック
        phase: 13
        done: true
      E8:
