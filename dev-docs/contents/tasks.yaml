  E:
    title: YAML DSL クエリ評価拡充
    impl_paths:
      - src/another_mood/components/composer/query.py
      - src/another_mood/resources/schemas/
    spec: design/composer/queries-spec.md
    tasks:
      E1:
        title: where 句の仕様詰め + 実装
        note: |
          詳細は design/composer/queries-spec.md「where (E1)」。
          構造化 YAML 形式 (式言語ではない)。述語の閉じた集合:
          eq / neq / is_null / gt / gte / lt / lte / startswith / endswith / contains
          + ブール結合 and / or。catalog 上は type: object opaque
          (metadata/validation と同じパターン)。
          derive は identity (where は schema を変えない)。
        phase: 10
        proposal: design/composer/queries-spec.md#where--sort--join-e1-e4
      E2:
        title: sort 句の仕様詰め + 実装
        note: |
          詳細は design/composer/queries-spec.md「sort (E2)」。
          object 形式で by / direction (asc/desc, default asc) / nulls
          (first/last, default last) を指定。単一属性キーのみ。
          複合キー / 派生式は将来 Group By との合わせ技で検討。
          derive は identity (sort は schema を変えない)。
        phase: 10
        proposal: design/composer/queries-spec.md#where--sort--join-e1-e4
      E3:
        title: join 句の仕様詰め + 実装
        note: |
          詳細は design/composer/queries-spec.md「join (E3)」。
          list 形式、左結合的評価。kind は nested / flat_inner / flat_left
          の 3 択 required (default なし)。on: は単一キーの eq のみ。
          as: 必須 (nested で配列名、flat で prefix)。
          右側 pre-filter は join[].filter: (where と分離)。
          where: は常に post-join。
          derive は kind ごとに固有の catalog transform を持つ
          (where/sort と異なり identity ではない)。
          スコープ外: 複合キー on:, 多重 NESTED, FK 自動推論。
        phase: 10
        proposal: design/composer/queries-spec.md#where--sort--join-e1-e4
      E4:
        title: QuerySchema を E1〜E3 に合わせて拡張
        phase: 10
        proposal: design/composer/queries-spec.md#where--sort--join-e1-e4
      E9:
        title: catalog データモデルの依存方向反転 (Node primary)
        note: |
          現状は Entity / ObjectType / Attribute (persist form) が先に
          定義され Node / Edge (in-memory tree) がそれに依存する形だが、
          本質的には Node が構造の正本で Entity は serialization view
          (id 派生規則付き) と捉えるのが自然。これに合わせて:
          - data_catalog.py 内宣言順序を Edge/Node →
            Attribute/ObjectType/Entity に reorder
          - `Node.from_flat` / `Node.to_flat` を Entity 側に移動
            (例: `Entity.from_node` / `Entity.to_node`、命名は実装時判断)
          - 全 call site (schema_tree, query_deriver, composer 等) の追従
          F8 で self-description method (Node を返す classmethod) を
          parens 抜きの property access として書けなかったのが、まさに
          この倒立の症状。反転すればクラス属性化を含む自然な API に
          書き直せる。F7 のブロッカーではないが、F7 のテンプレート
          Query 化が新しい依存方向の API 上で書ければ思考コストが
          下がるので、F7 より前に入れるのが望ましい。
        phase: 10
      E8:
        title: "`from:` パス解決の最長一致化"
        note: |
          `dc.Node.walk_path` を共有ヘルパとして導入し、`From.derive` /
          `From.apply` がカタログ edge 名による最長一致 walk で path を解決する
          形に変更。詳細は design/composer/queries-spec.md「Internal Design」。
          F8 (`__definition` 自己記述カタログ) の前提が整った。
        phase: 10
        done: true
      E6:
        title: クエリ名と正規化済みデータ名の同名禁止チェック
        note: |
          queries-spec.md「同名禁止」。現状は composer.py が sources[name] を
          silent に上書きするため、著者が気付かずにパススルーデータを
          上書きする事故が起きる。重複を検知してエラーにする。
        phase: 13
        proposal: design/composer/queries-spec.md#同名禁止-e6

