          (1) 入力側 = 計算結果を通常の contents YAML として還流 — 既に可能で
          schema / x-ref 検証も効く、(2) 出力側 = クエリ結果の機械可読エクスポート (YAML) —
          未提供 (現 __db/__queries は人間向け診断 Markdown で結果データではない)。
          実需が具体化した時点で (2) の安定契約と「export → 外部計算 → contents 還流」
          ラウンドトリップのガイド化を仕様検討する。クエリ DSL への集約関数追加
          (sum / count 等) は、それでも足りない場合の後続候補。
        phase: 18

  L:
