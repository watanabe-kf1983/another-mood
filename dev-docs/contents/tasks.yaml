          ファイル・ディレクトリを黙って無視する。将来 mood が新配置を追加したとき
          旧 mood が silent に読み飛ばす前方互換の穴になるため、mood の管轄領域である
          definition/ 配下に限り未知エントリをエラーにする。プロジェクト直下は
          .git / README 等との同居が設計 (scaffold の cargo init 型と同根) のため
          対象外。背景は 20-app/60-sbdb-manifest の厳格パース節。
