        phase: 15
      N2:
        title: HTML / Asciidoc / PlantUML ジェネレート対応
        phase: 15
      N3:
        title: "watch で捨てられる hugo_build をスキップ (レンダリング効率)"
        note: |
          watch は preview を hugo serve が tmp (prep_dir/data) から配信する一方、hugo_build の
          静的 html は publish しない限り誰も読まない (G9 で watch は既定 publish なし)。保存ごとに
          捨てられる full hugo build がリビルド遅延に乗る。ただし report / error 伝播が
          publish (upstream = hugo_build) を経由するため、単純に外すと連鎖が切れる。連鎖を
          reconcile 側へ張り替える等の再配線が要る。build は static html が成果物なので hugo_build を残す。
        phase: 15

