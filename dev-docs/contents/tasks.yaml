categories:
  A:
    title: Markdown パーサー拡張
    impl_paths:
      - src/another_mood/components/preprocess/prose.py
      - src/another_mood/components/generator/
    spec: design/normalizer/markdown-parser-spec.md
    tasks:
      A1:
        title: "{#id} 付き見出しの検出"
        note: markdown-it-py の AST 走査
        phase: 10
      A2:
        title: セクション本文範囲の切り出し
        note: 次の同レベル以上の {#id} までを本文とする
        phase: 10
      A3:
        title: ファイル単位 + セクション単位のダブル出力
        note: 既存の parse_markdown 拡張
        phase: 10
      A4:
        title: セクション内見出しレベル正規化
        note: 最小レベルを H1 にシフト
        phase: 10
      A5:
        title: ソース内相対リンク → toc 記法への変換
        note: contents_dir 基点パス解決が必要 (B2 と連携)
        phase: 10
      A6:
        title: shiftHeadings(n) Jinja2 フィルタ
        note: テンプレート側で使用
        phase: 10

  B:
    title: アンカー / リンク解決
    impl_paths:
      - src/another_mood/components/generator/
    spec: design/generator/anchor-spec.md
    tasks:
      B1:
        title: views データのラッパーツリー構築
        note: data / parent / class_name フィールド
        phase: 10
      B2:
        title: アンカー ID 生成規則
        note: リスト型 {class}.item.{id} / シングルトン {class}
        phase: 10
      B3:
        title: アンカー → ラッパーのオンデマンド走査 + キャッシュ
        phase: 10
      B4:
        title: link_md Jinja2 フィルタ
        phase: 10
      B5:
        title: レンダリング後の toc:id 文字列のリンク URL 置換
        note: prose body 内も含む
        phase: 10
      B6:
        title: ラッパーの get_page_url() 実装
        note: C3 と連携
        phase: 10

  C:
    title: ページ分割 (paging)
    impl_paths:
      - src/another_mood/components/generator/
      - src/another_mood/components/generator/section_processor.py
    spec: design/generator/paging-spec.md
    tasks:
      C1:
        title: profilesFile の読み込み・パース
        phase: 10
      C2:
        title: paginate 設定の評価
        note: クラスが分割対象か判定
        phase: 10
      C3:
        title: パス自動導出
        note: リスト型 {class}/{id}.md / シングルトン {class}.md
        phase: 10
      C4:
        title: "{% section %} の振る舞い分岐: 分割 vs インライン展開"
        note: 現在は常に分割。インライン展開モードの新設になる
        phase: 10
      C5:
        title: プロファイル別の出力ディレクトリ規約
        note: "{outDir}/{profile}/index.md"
        phase: 10
      C6:
        title: 複数プロファイルの並列ビルド
        phase: 10

  D:
    title: ユーザコンテンツバリデーション
    impl_paths:
      - src/another_mood/components/preprocess/normalizer.py
      - src/another_mood/components/preprocess/schema_inspector.py
      - src/another_mood/components/preprocess/
      - src/another_mood/resources/schemas/schema-schema.yaml
      - src/another_mood/config.py
      - src/another_mood/cli.py
    spec: design/normalizer/schema-spec.md
    tasks:
      D1:
        title: --strict CLI フラグの配線
        note: pipeline 全体に伝播
        phase: 10
      D2:
        title: "FK チェック: to: schema_name"
        note: additionalProperties パターンの .id 省略形
        phase: 10
      D3:
        title: "FK チェック: to: schema_name.property_name"
        note: 明示プロパティ
        phase: 10
      D4:
        title: "FK チェック: from がプロパティ名なし"
        note: 辞書キー自体が FK
        phase: 10
      D5:
        title: "type: array スキーマ参照時のプロパティ名必須チェック"
        phase: 10
      D6:
        title: 参照先がトップレベルスキーマのみであることの検証
        note: ネストパス禁止
        phase: 10
      D7:
        title: 警告レポートを BuildReport に乗せる
        note: エラーではなく warning レベル
        phase: 10
      D8:
        title: Unique 制約の仕様確定
        note: 宣言場所 / 複合キー対応の有無（旧 I1）
        phase: 10
      D9:
        title: Unique 制約の実装 + チェック
        note: --strict 連動（旧 I2）
        phase: 10
      D10:
        title: schema.yaml への一本化 (`schemas:` ラッパー除去)
        note: |
          definition/schema.yaml 1 ファイル (素の JSON Schema) に切り替える。
          詳細は schema-spec.md。references の実装は同時に削除 (仕様書には将来仕様として残す)。
        phase: 8
        done: true

  E:
    title: YAML DSL クエリ評価拡充
    impl_paths:
      - src/another_mood/components/composer/query.py
      - src/another_mood/resources/schemas/
    spec: design/composer/queries-spec.md
    tasks:
      E1:
        title: where 句の仕様詰め + 実装
        note: 式言語にするか、単純な eq のみか
        phase: 10
      E2:
        title: sort 句の仕様詰め + 実装
        phase: 10
      E3:
        title: join 句の仕様詰め + 実装
        note: 参照整合性 (D) との関係整理
        phase: 10
      E4:
        title: QuerySchema を E1〜E3 に合わせて拡張
        phase: 10
      E5:
        title: from 句の子エンティティ対応
        note: "from: parent.child ドット記法で任意の深さまでフラット化"
        phase: 8
        done: true
      E6:
        title: クエリ名と正規化済みデータ名の同名禁止チェック
        note: |
          queries-spec.md「同名禁止」。現状は composer.py が sources[name] を
          silent に上書きするため、著者が気付かずにパススルーデータを
          上書きする事故が起きる。重複を検知してエラーにする。
        phase: 10
      E7:
        title: "Query Object の apply_to_catalog 実装"
        note: |
          設計: internal/components/composer.md「Query Object の双対性」節。
          クエリ定義から静的に出力スキーマを推論 + 合成 child entity を
          __definition.entities に emit。F3 の前提。
        phase: 8
        done: true

  F:
    title: メタドキュメンテーション拡張
    impl_paths:
      - src/another_mood/resources/
      - src/another_mood/components/generator/
    spec: design/app/meta-documentation.md
    tasks:
      F1:
        title: Generator の動的名前引き拡張
        note: 変数で view 名を参照できるようにする (F2/F3 の前提)
        phase: 8
        done: true
      F2:
        title: Table View (実データのテーブル表示)
        note: |
          前提 F1。L5d (Guides 執筆) の検討過程で、テンプレートを書く前に
          スキーマ / コンテンツを育てるフィードバックチャネルとして不可欠と判明し、
          phase 10 から phase 8 に昇格。F3 と実装の大半が共通化できる見込み。
        phase: 8
        done: true
      F3:
        title: Query View (クエリ結果の表示)
        note: |
          前提 F1, E7。
          設計: design/app/meta-documentation.md「Entity と Query のページ構成」節。
          __meta_query.md に Definition / Output Schema / Results の 3 セクションを追加。
        phase: 8
      F4:
        title: ER 図テンプレート
        note: 前提 D, E3, Mermaid エスケープ
        phase: 10
      F5:
        title: DFD テンプレート
        note: 仕様未着手
        phase: 10
      F6:
        title: CRUD マトリクステンプレート
        note: 仕様未着手
        phase: 10

  G:
    title: CLI / 設定システム
    impl_paths:
      - src/another_mood/cli.py
      - src/another_mood/config.py
    spec: design/app/cli-spec.md
    tasks:
      G1:
        title: mood init コマンド (プロジェクト初期化)
        note: cli-spec.md。MCP ツールとしても提供する
        phase: 8
        done: true
      G2:
        title: another-mood.config.json 読み込み
        note: config-spec.md
        phase: 10
      G3:
        title: render.customServer.command 対応
        note: config-spec.md
        phase: 10
      G4:
        title: schema_dir の単複統一 (schema/ → schemas/)
        note: |
          ディレクトリ名が schema/ のみ単数で queries/ / templates/ と
          揃わない問題を解消。2 層概念（ユーザが書く「schema」=
          JSON Schema 由来 vs 内部で抽出される「entity」=
          browsable ノード）は正当な区別として維持する方針のため、
          以下は据え置き:
            - YAML キー `schemas:` (OpenAPI の components.schemas 流)
            - UI 見出し `Entities` (ネスト展開済みノード群を指す)
            - 内部コード変数 `entity` (schema_tree / data_catalog 他)

          リネーム対象 (破壊的):
            - <project>/definition/schema/ → definition/schemas/
            - ProjectConfig.schema_dir → schemas_dir (src/another_mood/config.py)
            - 環境変数 RB_SCHEMA_DIR → RB_SCHEMAS_DIR
            - src/another_mood/resources/schemas/schema/ →
              src/another_mood/resources/schemas/schemas/
            - showcase/examples/*/definition/schema/ 配下の移動
            - dev-docs/definition/schema/ 配下の移動
            - docs/ 内の schema/ 言及箇所の更新

          CHANGELOG / 移行メモが必要。F1-F3 (Table / Query View) による
          データシート UI 追加と認知負荷を集約できるので、同時期の実施が望ましい。
        phase: 8
        done: true

  H:
    title: バイナリファイルの取り扱い
    impl_paths:
      - src/another_mood/components/preprocess/normalizer.py
      - src/another_mood/components/composer/
      - src/another_mood/components/generator/
    spec: internal/components/normalizer.md
    tasks:
      H1:
        title: 仕様確定
        note: パス解決 / Composer への受け渡し / テンプレートからの参照方法
        phase: 10
      H2:
        title: 実装
        phase: 10

  J:
    title: プラグインシステム
    impl_paths:
      - src/another_mood/
    tasks:
      J1:
        title: 計算機能プラグインの I/F 仕様検討
        note: 入出力 / 登録方法 / Composer か Generator のどこに挿すか
        phase: 10
      J2:
        title: サンプル実装で I/F 検証
        note: 例 — ファンクションポイント算出
        phase: 10

  K:
    title: MCP サーバ
    impl_paths:
      - src/another_mood/mcp/
    spec: design/app/mcp-design.md
    tasks:
      K1:
        title: MCP サーバの骨格
        note: FastMCP + build / dev start / dev stop ツール登録
        phase: 9
      K2:
        title: build ツール
        note: CLI の mood build と同一パイプラインをワンショット同期実行し結果を返す
        phase: 9
      K3:
        title: dev start / dev stop ツール
        note: dev server のバックグラウンド起動・停止。PID 管理・二重起動防止
        phase: 9
      K4:
        title: Resources として output 全量を公開
        note: resources/list + resources/read で AI がドキュメントをオンデマンド取得
        phase: 9
      K5:
        title: Server Instructions + Tool description の整備
        note: Instructions は 200 語以内の誘導文。Tool description は docstring から自動生成
        phase: 9
      K6:
        title: メタスキーマへの説明メタデータ埋め込み
        note: query-schema.yaml / schema-schema.yaml に title / description を追加。MCP 前提ではないが K4 の効果を高める
        phase: 8

  M:
    title: JSON データモデル と データカタログ
    impl_paths:
      - src/another_mood/components/shared/json_data_model.py
      - src/another_mood/components/preprocess/schema_inspector.py
      - src/another_mood/components/shared/data_catalog.py
    spec: internal/json-data-model.md
    tasks:
      M1:
        title: _parent 参照の付与
        note: ルート以外の全ノードに親オブジェクトへの参照を付与。永続化形式とクエリモデルの分離を実現する基盤
        phase: 10
      M2:
        title: Entity と ObjectType の分離
        note: CatalogEntity を access_path ベースの Entity と path+`.item` ベースの ObjectType に分割。Catalog プレフィックスも除去。
        phase: 8
        done: true
      M3:
        title: CatalogField を CatalogAttribute にリネーム
        note: Entity-Attribute の container-member pair に揃える (データカタログは ER 文脈)。
        phase: 8
        done: true
      M4:
        title: Entity Name の導入 (`title:` 由来の表示ラベル)
        note: 表示参照を Entity ID から Name に切り替え。未指定時は ID にフォールバック。
        phase: 10

  N:
    title: レンダリング / 出力形式
    impl_paths:
      - src/another_mood/pipeline/adapters/
      - src/another_mood/components/generator/
    tasks:
      N1:
        title: Hugo 利用の見直しと代替 HTML Renderer / Live Server の導入
        phase: 10
      N2:
        title: HTML / Asciidoc / PlantUML ジェネレート対応
        phase: 10

  P:
    title: テンプレートエンジン拡張
    impl_paths:
      - src/another_mood/components/generator/section_processor.py
      - src/another_mood/components/generator/template_engine.py
    spec: design/generator/template-spec.md
    tasks:
      P1:
        title: "{% section %} タグの拡張文法"
        note: |
          現状は {% section EXPR with EXPR %} 形式のみ対応。
          template-spec.md の例示で使われている以下 2 形式を追加する。
            - for 形式:    {% section "NAME" for SEQ %}
            - filter 形式: {% section NAME[id="..."] %}
        phase: 10
      P2:
        title: "{% section %} に inline オプション"
        note: |
          設計: design/generator/template-spec.md「inline オプション」節。
          強制インライン展開。F3 の Query View ページ内埋め込みで使う。
          C4 (paginate 自動判定) の先行版。
        phase: 8
      P3:
        title: "{% section %} → mood_section タグリネーム"
        note: |
          標準 Jinja2 タグと紛らわしい名前を独自タグ命名に寄せる。L6
          (英訳 + MCP 準備) 前に実施するのが望ましいが必須ではない。
          既存の組み込み / ユーザ / docs / reference の一括置換が必要。
        phase: 8

  O:
    title: バグ修正
    impl_paths:
      - src/another_mood/components/preprocess/
      - src/another_mood/components/shared/
      - src/another_mood/pipeline/
    tasks:
      O1:
        title: スキーマチェックエラーの行番号ズレ修正
        phase: 8
        done: true
      O2:
        title: カスケード handler の upstream 読み取りと上流書き込みの race 抑止
        note: "現状は error_propagation + watch 再 fire で最終状態に収束するが、transient な traceback と ng 状態が dev 体験を汚す。読み取り側で upstream の exclusive_write FileLock を共有・取得するなどで race 発生自体を防ぎたい"
        phase: 8
        done: true

  L:
    title: dog-fooding リファクタ
    impl_paths:
      - dev-docs/contents/
      - dev-docs/definition/
    tasks:
      L1:
        title: 構造化データに振り替えられる箇所の棚卸し
        phase: 10
      L2:
        title: スキーマ + クエリ + テンプレート群の構築
        phase: 10
      L3:
        title: 実施過程で見つかったツールの不足を A〜K にフィードバック
        phase: 10
      L4:
        title: tasks のフェーズ別ビュー作成
        note: "E5 で from: parent.child は完了。クエリ + テンプレートで実現"
        phase: 8
        done: true

  LII:
    title: 利用者ドキュメント
    impl_paths:
      - docs/
      - README.md
    tasks:
      L5a:
        title: "Reference: Schema + Content Formats 執筆"
        note: |
          docs/reference/schema.md と docs/reference/content-formats.md の本文を埋める。
          dev-docs/design/normalizer/ を参照元とし、Implemented 機能のみ記載。
        phase: 8
        done: true
      L5b:
        title: "Reference: Query DSL + Template 執筆"
        note: |
          docs/reference/query-dsl.md と docs/reference/template.md の本文を埋める。
          dev-docs/design/composer/ と design/generator/ を参照元とし、
          Implemented 機能のみ。
          実装ベースで全量書き、ユーザレビューは TOC のみ。
          文体・用語の最終磨きは L5e（Reference polish）に委ねる。
        phase: 8
        done: true
      L5c:
        title: "Reference: CLI 執筆"
        note: |
          docs/reference/cli.md の本文を埋める。
          dev-docs/design/app/cli-spec.md を参照元とし、init / build / watch の Implemented
          サブコマンドのみ記載。
          実装ベースで全量書き、ユーザレビューは TOC のみ（L5b と同じ運用）。
          最終磨きは L5e。
        phase: 8
        done: true
      L5d:
        title: Guides 執筆
        note: |
          docs/guides.md の本文を埋める。Intro / Quick Start / 執筆フロー /
          コンテンツとスキーマ / クエリ / テンプレート を 1 ファイルに集約する。
          見出し骨格は既に配置済み。

          章構成は「another-mood とは → Quick Start → 執筆フロー →
          コンテンツとスキーマ → クエリ → テンプレート」。出力側から
          内側へ peel back する流れ。独立 how-to + 「なぜこう書くか」で構成し、
          メンタルモデル節は置かない（利用者がワークフローを追ううちに
          自然に獲得する構成）。用語はインライン定義で済ませる。

          前提: F1〜F3 実装後に着手する。テンプレート章を最後に回す構成は、
          F2/F3 のメタビューでスキーマ/コンテンツ/クエリを育てられることに依存する。
        phase: 8
      L5e:
        title: Reference polish
        note: |
          L5a〜L5c で TOC 優先に書いた Reference を、L5d (Guides) で確定した
          語彙・例・書き味に揃える最終調整。
          用語定義の重複整理、cross-reference の見直し、文体の統一が主。
        phase: 8
      L6:
        title: README + docs/ の英訳 + 執筆言語の英語切替
        note: |
          phase 8 の最終タスク。phase 9 の MCP 実装が開始する前に英語化を完了し、
          MCP 経由で読まれる際のトークン効率を確保する。
          このタスクは単発の翻訳作業であると同時に「執筆言語の切替点」でもあり、
          以降の docs/ 追記は英語直接で書く運用に移行する（bilingual 維持はしない）。
          dev-docs/ は内部資料のため日本語のまま維持する。
          翻訳対象: README.md, docs/ 配下全て。
        phase: 8
