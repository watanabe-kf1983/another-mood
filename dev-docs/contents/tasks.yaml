      B6:
        title: ラッパーの get_page_url() 実装
        note: C3 と連携
        phase: 10
        proposal: design/generator/generator.md#リンク解決-b1-b6

  C:
    title: ページ分割 (paging)
    impl_paths:
      - src/another_mood/components/generator/
      - src/another_mood/components/generator/mood_view_processor.py
    spec: design/generator/paging-spec.md
    tasks:
      C1:
        title: profilesFile の読み込み・パース
        phase: 10
        proposal: design/generator/paging-spec.md#proposals
      C2:
        title: paginate 設定の評価
        note: クラスが分割対象か判定
        phase: 10
        proposal: design/generator/paging-spec.md#proposals
      C3:
        title: パス自動導出
        note: リスト型 {class}/{id}.md / シングルトン {class}.md
        phase: 10
        proposal: design/generator/paging-spec.md#proposals
      C4:
        title: "{% mood_view %} の振る舞い分岐: 分割 vs インライン展開"
        note: 現在は常に分割。インライン展開モードの新設になる
        phase: 10
        proposal: design/generator/paging-spec.md#proposals
      C5:
        title: プロファイル別の出力ディレクトリ規約
        note: "{outDir}/{profile}/index.md"
        phase: 10
        proposal: design/generator/paging-spec.md#proposals
      C6:
        title: 複数プロファイルの並列ビルド
        phase: 10
        proposal: design/generator/paging-spec.md#proposals

  D:
    title: ユーザコンテンツバリデーション
    impl_paths:
      - src/another_mood/components/preprocess/normalizer.py
      - src/another_mood/components/preprocess/schema_inspector.py
      - src/another_mood/components/preprocess/
      - src/another_mood/resources/schemas/schema-schema.yaml
      - src/another_mood/config.py
      - src/another_mood/cli.py
    spec: design/normalizer/schema-spec.md
    tasks:
      D1:
        title: --strict CLI フラグの配線
        note: pipeline 全体に伝播
        phase: 10
        proposal: design/normalizer/schema-spec.md#参照整合性制約-references-d1-d7
      D2:
        title: "FK チェック: to: schema_name"
        note: additionalProperties パターンの .id 省略形
        phase: 10
        proposal: design/normalizer/schema-spec.md#参照整合性制約-references-d1-d7
      D3:
        title: "FK チェック: to: schema_name.property_name"
        note: 明示プロパティ
        phase: 10
        proposal: design/normalizer/schema-spec.md#参照整合性制約-references-d1-d7
      D4:
        title: "FK チェック: from がプロパティ名なし"
        note: 辞書キー自体が FK
        phase: 10
        proposal: design/normalizer/schema-spec.md#参照整合性制約-references-d1-d7
      D5:
        title: "type: array スキーマ参照時のプロパティ名必須チェック"
        phase: 10
        proposal: design/normalizer/schema-spec.md#参照整合性制約-references-d1-d7
      D6:
        title: 参照先がトップレベルスキーマのみであることの検証
        note: ネストパス禁止
        phase: 10
        proposal: design/normalizer/schema-spec.md#参照整合性制約-references-d1-d7
      D7:
        title: 警告レポートを BuildReport に乗せる
        note: エラーではなく warning レベル
        phase: 10
        proposal: design/normalizer/schema-spec.md#参照整合性制約-references-d1-d7
      D8:
        title: Unique 制約の仕様確定
        note: 宣言場所 / 複合キー対応の有無（旧 I1）
        phase: 10
        proposal: design/normalizer/normalizer.md#unique-制約-d8-d9
      D9:
        title: Unique 制約の実装 + チェック
        note: --strict 連動（旧 I2）
        phase: 10
        proposal: design/normalizer/normalizer.md#unique-制約-d8-d9
      D10:
        title: schema.yaml への一本化 (`schemas:` ラッパー除去)
        note: |
          definition/schema.yaml 1 ファイル (素の JSON Schema) に切り替える。
          詳細は schema-spec.md。references の実装は同時に削除 (仕様書には将来仕様として残す)。
        phase: 8
        done: true

  E:
    title: YAML DSL クエリ評価拡充
    impl_paths:
      - src/another_mood/components/composer/query.py
      - src/another_mood/resources/schemas/
    spec: design/composer/queries-spec.md
    tasks:
      E1:
        title: where 句の仕様詰め + 実装
        note: 式言語にするか、単純な eq のみか
        phase: 10
        proposal: design/composer/queries-spec.md#where--sort--join-e1-e4
      E2:
        title: sort 句の仕様詰め + 実装
        phase: 10
        proposal: design/composer/queries-spec.md#where--sort--join-e1-e4
      E3:
        title: join 句の仕様詰め + 実装
        note: 参照整合性 (D) との関係整理
        phase: 10
        proposal: design/composer/queries-spec.md#where--sort--join-e1-e4
      E4:
        title: QuerySchema を E1〜E3 に合わせて拡張
        phase: 10
        proposal: design/composer/queries-spec.md#where--sort--join-e1-e4
      E5:
        title: from 句の子エンティティ対応
        note: "from: parent.child ドット記法で任意の深さまでフラット化"
        phase: 8
        done: true
      E6:
        title: クエリ名と正規化済みデータ名の同名禁止チェック
        note: |
          queries-spec.md「同名禁止」。現状は composer.py が sources[name] を
          silent に上書きするため、著者が気付かずにパススルーデータを
          上書きする事故が起きる。重複を検知してエラーにする。
        phase: 10
        proposal: design/composer/queries-spec.md#同名禁止-e6
      E7:
        title: "Query Object の apply_to_catalog 実装"
        note: |
          クエリ定義から静的に出力スキーマを推論 + 合成 child entity を
          __definition.entities に emit。F3 の前提。
        phase: 8
        done: true

  F:
    title: メタドキュメンテーション拡張
    impl_paths:
      - src/another_mood/resources/
      - src/another_mood/components/generator/
    spec: design/app/meta-documentation.md
    tasks:
      F1:
        title: Generator の動的名前引き拡張
        note: 変数で view 名を参照できるようにする (F2/F3 の前提)
        phase: 8
        done: true
      F2:
        title: Table View (実データのテーブル表示)
        note: |
          前提 F1。L5d (Guides 執筆) の検討過程で、テンプレートを書く前に
          スキーマ / コンテンツを育てるフィードバックチャネルとして不可欠と判明し、
          phase 10 から phase 8 に昇格。F3 と実装の大半が共通化できる見込み。
        phase: 8
        done: true
      F3:
        title: Query View (クエリ結果の表示)
        note: |
          前提 F1, E7。
          設計: design/app/meta-documentation.md「Entity と Query のページ構成」節。
          __meta_query.md に Definition / Shape / Results の 3 セクションを追加。
        phase: 8
        done: true
      F4:
        title: ER 図テンプレート
        note: 前提 D, E3, Mermaid エスケープ
        phase: 10
        proposal: design/app/meta-documentation.md#er-図-f4
      F5:
        title: DFD テンプレート
        note: 仕様未着手
        phase: 10
      F6:
        title: CRUD マトリクステンプレート
        note: 仕様未着手
        phase: 10
      F7:
        title: メタドキュメンテーションテンプレートの Query 化リファクタ
        note: |
          詳細は design/app/meta-documentation.md「Query 化リファクタ (F7)」。
          前提 E1〜E4 (where / sort / join) の DSL 拡張。
        phase: 10
        proposal: design/app/meta-documentation.md#query-化リファクタ-f7

  G:
    title: CLI / 設定システム
    impl_paths:
      - src/another_mood/cli.py
      - src/another_mood/config.py
    spec: design/app/cli-spec.md
    tasks:
      G1:
        title: mood init コマンド (プロジェクト初期化)
        note: cli-spec.md。MCP ツールとしても提供する
        phase: 8
        done: true
      G2:
        title: another-mood.config.json 読み込み
        note: config-spec.md
        phase: 10
        proposal: design/app/config-spec.md#設定ファイル-g2
      G3:
        title: render.customServer.command 対応
        note: config-spec.md
        phase: 10
        proposal: design/app/config-spec.md#rendercustomservercommand-g3
      G4:
        title: schema_dir の単複統一 (schema/ → schemas/)
        note: |
          ディレクトリ名が schema/ のみ単数で queries/ / templates/ と
          揃わない問題を解消。2 層概念（ユーザが書く「schema」=
          JSON Schema 由来 vs 内部で抽出される「entity」=
          browsable ノード）は正当な区別として維持する方針のため、
          以下は据え置き:
            - YAML キー `schemas:` (OpenAPI の components.schemas 流)
            - UI 見出し `Entities` (ネスト展開済みノード群を指す)
            - 内部コード変数 `entity` (schema_tree / data_catalog 他)

          リネーム対象 (破壊的):
            - <project>/definition/schema/ → definition/schemas/
            - ProjectConfig.schema_dir → schemas_dir (src/another_mood/config.py)
            - 環境変数 RB_SCHEMA_DIR → RB_SCHEMAS_DIR
            - src/another_mood/resources/schemas/schema/ →
              src/another_mood/resources/schemas/schemas/
            - showcase/examples/*/definition/schema/ 配下の移動
            - dev-docs/definition/schema/ 配下の移動
            - docs/ 内の schema/ 言及箇所の更新

          CHANGELOG / 移行メモが必要。F1-F3 (Table / Query View) による
          データシート UI 追加と認知負荷を集約できるので、同時期の実施が望ましい。
        phase: 8
        done: true
      G5:
        title: "mood watch --host: preview server の bind アドレス指定"
        note: |
          詳細は design/app/cli-spec.md「mood watch --host (G5)」、
          config キーは design/app/config-spec.md。
        phase: 10
        proposal: design/app/cli-spec.md#mood-watch-host-g5
      G6:
        title: "mood watch --detach + PID file 対応"
        note: |
          設計議論の結果 punt（K7 と運命を共に）。判断根拠と将来再検討の入口は
          design/app/mcp-design.md「## 背景: watch をバックグラウンド化しない
          理由」を参照。
        phase: 999  # punt: not scheduled
      G7:
        title: "mood init --template: テンプレート選択対応"
        note: |
          現状 init は showcase/starter を一択でハードコード
          (src/another_mood/components/scaffold/init.py)。MCP の K2 で
          showcase/ を Resources として同梱せず「`mood init --template xxx`
          でエージェントが体験する」方針に揃えるため、テンプレート選択を
          可能にする。

          範囲:
            - `--template <name>` オプション追加 (省略時 starter)
            - showcase/{starter, examples/*} の走査・列挙
            - 不正なテンプレート名のエラー表示
            - K5 (MCP init ツール) で同じテンプレート群を扱える形に
              init_project シグネチャを整える
            - cli-spec.md / docs/reference/cli.md の更新

          K2 (Resources 公開) の設計根拠として、`mood init --template`
          が複数テンプレートを扱える状態を前提にしているため、K2 の前に着手する。
        phase: 9
        done: true

  H:
    title: バイナリファイルの取り扱い
    impl_paths:
      - src/another_mood/components/preprocess/normalizer.py
      - src/another_mood/components/composer/
      - src/another_mood/components/generator/
    spec: design/normalizer/normalizer.md
    tasks:
      H1:
        title: 仕様確定
        note: パス解決 / Composer への受け渡し / テンプレートからの参照方法
        phase: 10
        proposal: design/normalizer/normalizer.md#バイナリファイルの正規化-h1-h2
      H2:
        title: 実装
        phase: 10
        proposal: design/normalizer/normalizer.md#バイナリファイルの正規化-h1-h2
      H3:
        title: 散文サブシステムの一般化（媒体非依存化と `prose` 改名）
        note: |
          詳細は design/normalizer/normalizer.md「散文サブシステムの一般化 (H3)」。
          前提 H1, H2。
        phase: 10
        proposal: design/normalizer/normalizer.md#散文サブシステムの一般化-h3

  J:
    title: プラグインシステム
    impl_paths:
      - src/another_mood/
    tasks:
      J1:
        title: 計算機能プラグインの I/F 仕様検討
        note: 入出力 / 登録方法 / Composer か Generator のどこに挿すか
        phase: 10
      J2:
        title: サンプル実装で I/F 検証
        note: 例 — ファンクションポイント算出
        phase: 10

  K:
    title: MCP サーバ
    impl_paths:
      - src/another_mood/mcp/
    spec: design/app/mcp-design.md
    tasks:
      K1:
        title: FastMCP 骨格
        note: |
          MCP サーバの infra のみ。FastMCP server boilerplate, entry point
          (mood mcp サブコマンド形式の決定もここ), モジュール構成, 統合テスト足場
          (FastMCP test client での疎通確認 fixture)。ツール / Resources / Instructions
          は含まない。
          出口: サーバが起動して MCP protocol handshake が通る。
          K2 と同セッション / 同 PR で実施することも検討可 (K1 単独だと PR が thin)。
        phase: 9
        done: true
      K2:
        title: Resources 公開 + Tools 並行公開
        note: |
          設計書のコア機能の片方。MCP Resources の公開と、それを
          Tool としても並行公開する仕組み。
          URI スキーム設計 / 走査 / resources/list + resources/read 実装 /
          ファイル → Resource (mimeType, name, description) の mapping。
          並行して list_docs / read_doc Tool を露出 (クライアント差吸収)。
          出口: 全主要クライアントで agent が docs を自律的に引ける
          (Claude Code: Resources 経路、Copilot Chat: Tools 経路)。
          K1 と同 PR にまとめる選択肢あり (合わせて「ナビゲーター MVP」)。
        phase: 9
        done: true
      K3:
        title: Server Instructions
        note: |
          設計書のコア機能のもう片方。200 語以内の誘導文 + FastMCP の initialize
          レスポンスに乗せる注入機構。K2 の URI スキームと K4 / K5 のツール群を
          参照するため、当該タスクがすべて揃ってから一括起草する (各タスクで
          iterative に追記する運用は採らない: 200 語制限下で首尾一貫した文面を
          得るため、また各ツールでの agent 失敗モードを実観察してから書く方が
          指針として効くため)。注入機構自体は FastMCP("name", instructions=text)
          の 1 行追加で済むので分割しない。

          watch を MCP 制御しない方針 (design/app/mcp-design.md 参照) に伴い、
          「user に `mood watch <dir>` の foreground 起動を案内する」guidance
          を Instructions に含める検討事項として残す。

          出口: agent が接続時に Instructions を受け取り、Resources / Tools へ
          誘導される。
        phase: 9
        done: true
      K4:
        title: build ツール
        note: |
          CLI の mood build と同一パイプラインをワンショット同期実行し結果を返す。
          docstring は FastMCP が Tool description として自動利用する。
          K3 (Instructions) が後続するまで agent はこれだけが頼りなので丁寧に書く。
        phase: 9
        done: true
      K5:
        title: init ツール
        note: |
          G1 (mood init) の MCP 露出。CLI の mood init と同一の動作。
          docstring を丁寧に書く (K3 が後続するまで agent はこれだけが頼り)。
          K8 (出力境界整理) を前提とする: scaffold が ScaffoldResult を返す前提で
          実装する。
        phase: 9
        done: true
      K6:
        title: メタスキーマへの説明メタデータ埋め込み
        note: query-schema.yaml / schema-schema.yaml に title / description を追加。MCP 前提ではないが K2 の効果を高める
        phase: 8
        done: true
      K7:
        title: MCP start / stop ツール
        note: |
          設計議論の結果 punt。判断根拠と将来再検討の入口は
          design/app/mcp-design.md「## 背景: watch をバックグラウンド化しない
          理由」を参照。
        phase: 999  # punt: not scheduled
      K8:
        title: ユーザ向け出力の境界整理 (値 + logging への集約)
        note: |
          K4 / K5 / K7 の前提。components / pipeline からの直接印字を排し、
          user-visible な結果は値 (BuildReport / ScaffoldResult) と
          on_report callback、live フィードバックは logging に統一。
          CLI / MCP の双方が呼ぶ command.py を新設し、print は cli.py のみ
          (ruff T201 で機械的強制)。
        phase: 9
        done: true

  M:
    title: JSON データモデル と データカタログ
    impl_paths:
      - src/another_mood/components/shared/json_data_model.py
      - src/another_mood/components/preprocess/schema_inspector.py
      - src/another_mood/components/shared/data_catalog.py
    spec: design/json-data-model.md
    tasks:
      M1:
        title: _parent 参照の付与
        note: ルート以外の全ノードに親オブジェクトへの参照を付与。永続化形式とクエリモデルの分離を実現する基盤
        phase: 10
        proposal: design/json-data-model.md#親参照-_parent-m1
      M2:
        title: Entity と ObjectType の分離
        note: CatalogEntity を access_path ベースの Entity と path+`.item` ベースの ObjectType に分割。Catalog プレフィックスも除去。
        phase: 8
        done: true
      M3:
        title: CatalogField を CatalogAttribute にリネーム
