categories:
  A:
    title: Markdown パーサー拡張
    impl_paths:
      - src/another_mood/components/preprocess/prose.py
      - src/another_mood/components/generator/
    spec: design/normalizer/markdown-parser-spec.md
    tasks:
      A1:
        title: "{#id} 付き見出しの検出"
        note: markdown-it-py の AST 走査
        phase: 11
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A2:
        title: セクション本文範囲の切り出し
        note: 次の同レベル以上の {#id} までを本文とする
        phase: 11
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A3:
        title: ファイル単位 + セクション単位のダブル出力
        note: 既存の parse_markdown 拡張
        phase: 11
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A4:
        title: セクション内見出しレベル正規化
        note: 最小レベルを H1 にシフト
        phase: 11
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A5:
        title: ソース内相対リンク → toc 記法への変換
        note: contents_dir 基点パス解決が必要 (B2 と連携)
        phase: 11
        proposal: design/normalizer/markdown-parser-spec.md#リンク正規化-a5
      A6:
        title: shiftHeadings(n) Jinja2 フィルタ
        note: テンプレート側で使用
        phase: 11
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6

  B:
    title: アンカー / リンク解決
    impl_paths:
      - src/another_mood/components/generator/
    spec: design/generator/anchor-spec.md
    tasks:
      B1:
        title: views データのラッパーツリー構築
        note: data / parent / class_name フィールド
        phase: 11
        proposal: design/generator/generator.md#リンク解決-b1-b6
      B2:
        title: アンカー ID 生成規則
        note: リスト型 {class}.item.{id} / シングルトン {class}
        phase: 11
        proposal: design/generator/generator.md#リンク解決-b1-b6
      B3:
        title: アンカー → ラッパーのオンデマンド走査 + キャッシュ
        phase: 11
        proposal: design/generator/generator.md#リンク解決-b1-b6
      B4:
        title: link_md Jinja2 フィルタ
        phase: 11
        proposal: design/generator/generator.md#リンク解決-b1-b6
      B5:
        title: レンダリング後の toc:id 文字列のリンク URL 置換
        note: prose body 内も含む
        phase: 11
        proposal: design/generator/generator.md#リンク解決-b1-b6
      B6:
        title: ラッパーの get_page_url() 実装
        note: C3 と連携
        phase: 11
        proposal: design/generator/generator.md#リンク解決-b1-b6

  C:
    title: ページ分割 (paging)
    impl_paths:
      - src/another_mood/components/generator/
      - src/another_mood/components/generator/mood_view_processor.py
    spec: design/generator/paging-spec.md
    tasks:
      C1:
        title: profilesFile の読み込み・パース
        phase: 11
        proposal: design/generator/paging-spec.md#proposals
      C2:
        title: paginate 設定の評価
        note: クラスが分割対象か判定
        phase: 11
        proposal: design/generator/paging-spec.md#proposals
      C3:
        title: パス自動導出
        note: リスト型 {class}/{id}.md / シングルトン {class}.md
        phase: 11
        proposal: design/generator/paging-spec.md#proposals
      C4:
        title: "{% mood_view %} の振る舞い分岐: 分割 vs インライン展開"
        note: 現在は常に分割。インライン展開モードの新設になる
        phase: 11
        proposal: design/generator/paging-spec.md#proposals
      C5:
        title: プロファイル別の出力ディレクトリ規約
        note: "{outDir}/{profile}/index.md"
        phase: 11
        proposal: design/generator/paging-spec.md#proposals
      C6:
        title: 複数プロファイルの並列ビルド
        phase: 11
        proposal: design/generator/paging-spec.md#proposals

  D:
    title: ユーザコンテンツバリデーション
    impl_paths:
      - src/another_mood/components/preprocess/normalizer.py
      - src/another_mood/components/preprocess/schema_inspector.py
      - src/another_mood/components/preprocess/
      - src/another_mood/resources/schemas/schema-schema.yaml
      - src/another_mood/config.py
      - src/another_mood/cli.py
    spec: design/normalizer/schema-spec.md
    tasks:
      D1:
        title: Meta-schema 拡張 — x-ref キーワードの受理
        note: |
          property 直下で x-ref を許容、items: 直下は明示エラー。値は
          { entity, attribute? } の構造化形式。辞書キー FK (propertyNames
          パターン) は当面サポート外。
        phase: 10
        done: true
      D2:
        title: Schema-Inspector 拡張 — x-ref の収集
        note: |
          traversal 中に x-ref を収集し、Attribute.x_ref: XRef として catalog
          に反映。既存 Attribute.entity / item_type は混同回避のため
          child_entity / child_item_type に改名。XRef.attribute は catalog
          層で常に文字列として解決済み (省略時は SchemaTree → DataCatalog
          境界で "id" を補う)。
        phase: 10
        done: true
      D3:
        title: Schema-level コヒーレンスチェック
        note: |
          x-ref.entity / x-ref.attribute を catalog 層で検証する build エラーを
          schema_inspector に追加。target スコープはユーザ entity + 内蔵 prose の
          トップレベル群 (__definition.* は除外)。type: array 参照時の attribute
          必須は、暗黙の "id" が target attribute に見つからないという形で
          attribute 検査に統合される。Diagnostic の line/column は parse_yaml の
          UserStr Location から復元する。
        phase: 10
        done: true
      D4:
        title: showcase/music への x-ref 適用
        note: |
          showcase/music スキーマの 7 FK を x-ref で宣言。__meta_entity
          テンプレートに references 列を追加し、target entity 名を meta
          ページへのリンクとして描画。
        phase: 10
        done: true
      D5:
        title: docs/reference 同期
        note: schema.md 等に x-ref キーワードの仕様を反映
        phase: 10
        proposal: design/normalizer/schema-spec.md#参照整合性制約-x-ref-d3-d5-d7
      D6:
        title: Data-level FK 整合性検査
        note: |
          各データ値が target 集合 (辞書キー集合 or 指定 attribute の値集合)
          に属するかを normalizer / validator で照合。違反は warning レベル。
        phase: 11
        proposal: design/normalizer/schema-spec.md#参照整合性制約-x-ref-d3-d5-d7
      D7:
        title: 警告インフラ
        note: |
          BuildReport の warning フィールド、output/__meta_*/ 配下の診断ページ、
          CLI --strict フラグの exit code 制御。D6 を表出するチャネル群。
        phase: 11
        proposal: design/normalizer/schema-spec.md#参照整合性制約-x-ref-d3-d5-d7
      D8:
        title: Unique 制約の仕様確定
        note: 宣言場所 / 複合キー対応の有無
        phase: 13
        proposal: design/normalizer/normalizer.md#unique-制約-d8-d9
      D9:
        title: Unique 制約の実装 + チェック
        note: --strict 連動
        phase: 13
        proposal: design/normalizer/normalizer.md#unique-制約-d8-d9

  E:
    title: YAML DSL クエリ評価拡充
    impl_paths:
      - src/another_mood/components/composer/query.py
      - src/another_mood/resources/schemas/
    spec: design/composer/queries-spec.md
    tasks:
      E1:
        title: where 句の仕様詰め + 実装
        phase: 10
        done: true
      E2:
        title: sort 句の仕様詰め + 実装
        phase: 10
        done: true
      E11:
        title: クエリ DSL 拡充前半 (flatten 句導入 + from 厳密化)
        phase: 10
        done: true
      E3:
        title: クエリ DSL 拡充後半 (join 句導入 + where 射程統一)
        phase: 10
        done: true
      E9:
        title: catalog データモデルの依存方向反転 (Node primary)
        note: |
          `data_catalog.py` の宣言順序を Edge/Node → Attribute/ObjectType/Entity
          に反転し、`catalog` を class attribute (parens 抜きアクセス) に降格。
          `Node.from_flat` / `Node.to_flat` はモジュール関数の
          `dc.build_tree` / `dc.flatten_tree` に移管。F7 のテンプレート Query 化を新しい依存方向の API 上で書ける
          ようにするための地ならし。
        phase: 10
        done: true
      E8:
        title: "`from:` パス解決の最長一致化"
        note: |
          `dc.Node.walk_path` を共有ヘルパとして導入し、`From.derive` /
          `From.apply` がカタログ edge 名による最長一致 walk で path を解決する
          形に変更。詳細は design/composer/queries-spec.md「Internal Design」。
          F8 (`__definition` 自己記述カタログ) の前提が整った。
        phase: 10
        done: true
      E6:
        title: クエリ名と正規化済みデータ名の同名禁止チェック
        note: |
          queries-spec.md「同名禁止」。現状は composer.py が sources[name] を
          silent に上書きするため、著者が気付かずにパススルーデータを
          上書きする事故が起きる。重複を検知してエラーにする。
        phase: 13
        proposal: design/composer/queries-spec.md#同名禁止-e6
      E10:
        title: singleton-flatten 内の object[] を child entity link として保持
        note: |
          `schema_tree._collect_edges` の singleton 分岐で、ArrayNode 型の
          sub-property に対してのみ `to_catalog_node(sub.node)` を呼んで
          child entity link を保持。`members.hobby.pets` のような
          nested collection が catalog の独立 entity になり、
          query DSL の `from:` で walk 可能・メタドキュメンテーションの
          自動生成対象にも入る。深いネスト object (singleton-of-singleton) は
          引き続き 1 段平坦化のみで、深い構造は catalog に現れない。
          詳細は design/normalizer/schema-spec.md「シングルトン」節。
        phase: 10
        done: true

  F:
    title: メタドキュメンテーション拡張
    impl_paths:
      - src/another_mood/resources/
      - src/another_mood/components/generator/
    spec: design/app/meta-documentation.md
    tasks:
      F4a:
        title: ER 図テンプレート — 全体図 + 基盤
        note: |
          全体図 (`index.md`)、新規クエリ `__user_content_entities`、
          Jinja2 フィルタ `mermaid_class_id`。前提 D, E11, E3。
          描画は Mermaid classDiagram、composition/association を区別。
          association edge ラベルは FK 属性名、カーディナリティは書かない。
        phase: 10
        proposal: design/app/meta-documentation.md#er-図-f4a-f4c
      F4b:
        title: ER 図テンプレート — 近傍図
        note: |
          `__meta_entity/<id>.md` に主役 + descendants + FK out 先を描く
          近傍図を追加。主役は全属性、隣接 entity はヘッダのみ。
          主役の attributes 表との重複は実物を見て判断。前提 F4a。
        phase: 10
        proposal: design/app/meta-documentation.md#er-図-f4a-f4c
      F4c:
        title: ER 図テンプレート — per-query 図
        note: |
          `__meta_query/<id>.md` に `{query.from} ∪ {join[].to}` の
          ノード集合で MS Access スタイルの ERD を描く。前提 F4a。
        phase: 10
        proposal: design/app/meta-documentation.md#er-図-f4a-f4c
      F5:
        title: DFD テンプレート
        note: 仕様未着手
        phase: 13
      F6:
        title: CRUD マトリクステンプレート
        note: 仕様未着手
        phase: 13
      F7:
        title: メタドキュメンテーションテンプレートの Query 化リファクタ
        note: |
          built-in テンプレートで DSL に寄せられる集計は寄せ、tree descent
          (子孫マッチ / walk_entity) はテンプレート / Python ヘルパに残す住み分けに
          落ち着いた。詳細は design/app/meta-documentation.md「メタドキュメンテーションの
          DSL 化境界」。
        phase: 10
        done: true
      F8:
        title: __definition の自己記述カタログを built-in に追加
        note: |
          F7 の前提。`__definition.entities` / `__definition.queries`
          (および子 entity の `.item_type.attributes` / `.select`)
          を built-in entity として登録し、クエリ DSL の `from:` で
          カタログ自体を読めるようにする。各 catalog dataclass の
          `catalog()` classmethod が Node 形式で構造を返し、
          `inspect_schema._emit_definition_catalog` が `to_flat` で
          namespace に配置する。composer 側は load_model に
          data_catalog_dir / queries_dir を合流させた。
          詳細は design/app/meta-documentation.md「自己記述カタログ」。
        phase: 10
        done: true

  G:
    title: CLI / 設定システム
    impl_paths:
      - src/another_mood/cli.py
      - src/another_mood/config.py
    spec: design/app/config-spec.md
    tasks:
      G2:
        title: another-mood.config.json 読み込み
        note: config-spec.md
        phase: 13
        proposal: design/app/config-spec.md#設定ファイル-g2
      G3:
        title: render.customServer.command 対応
        note: config-spec.md
        phase: 13
        proposal: design/app/config-spec.md#rendercustomservercommand-g3
      G5:
        title: "mood watch --host: preview server の bind アドレス指定"
        note: |
          利用者向け仕様は docs/reference/cli.md、
          config キーは design/app/config-spec.md。
        phase: 10
        done: true
      G8:
        title: "<projectDir> / RB_* パスを CWD 配下に制限"
        note: |
          詳細は design/app/config-spec.md「処理対象ディレクトリの CWD 配下制約 (G8)」。
          現状は CWD 外の絶対パスを basename フォールバックで受け入れている。
        phase: 13
        proposal: design/app/config-spec.md#処理対象ディレクトリの-cwd-配下制約-g8

  H:
    title: バイナリファイルの取り扱い
    impl_paths:
      - src/another_mood/components/preprocess/normalizer.py
      - src/another_mood/components/composer/
      - src/another_mood/components/generator/
    spec: design/normalizer/normalizer.md
    tasks:
      H1:
        title: 仕様確定
        note: パス解決 / Composer への受け渡し / テンプレートからの参照方法
        phase: 13
        proposal: design/normalizer/normalizer.md#バイナリファイルの正規化-h1-h2
      H2:
        title: 実装
        phase: 13
        proposal: design/normalizer/normalizer.md#バイナリファイルの正規化-h1-h2
      H3:
        title: 散文サブシステムの一般化（媒体非依存化と `prose` 改名）
        note: |
          詳細は design/normalizer/normalizer.md「散文サブシステムの一般化 (H3)」。
          前提 H1, H2。
        phase: 13
        proposal: design/normalizer/normalizer.md#散文サブシステムの一般化-h3

  J:
    title: プラグインシステム
    impl_paths:
      - src/another_mood/
    tasks:
      J1:
        title: 計算機能プラグインの I/F 仕様検討
        note: 入出力 / 登録方法 / Composer か Generator のどこに挿すか
        phase: 13
      J2:
        title: サンプル実装で I/F 検証
        note: 例 — ファンクションポイント算出
        phase: 13

  L:
    title: dog-fooding リファクタ
    impl_paths:
      - dev-docs/contents/
      - dev-docs/definition/
    tasks:
      L1:
        title: 構造化データに振り替えられる箇所の棚卸し
        phase: 13
      L2:
        title: スキーマ + クエリ + テンプレート群の構築
        phase: 13
      L3:
        title: 実施過程で見つかったツールの不足を他カテゴリにフィードバック
        phase: 13

  M:
    title: JSON データモデル と データカタログ
    impl_paths:
      - src/another_mood/components/shared/json_data_model.py
      - src/another_mood/components/preprocess/schema_inspector.py
      - src/another_mood/components/shared/data_catalog.py
    spec: design/json-data-model.md
    tasks:
      M1:
        title: _parent 参照の付与
        note: ルート以外の全ノードに親オブジェクトへの参照を付与。永続化形式とクエリモデルの分離を実現する基盤
        phase: 11
        proposal: design/json-data-model.md#親参照-_parent-m1
      M4:
        title: Entity Name の導入 (`title:` 由来の表示ラベル)
        note: 表示参照を Entity ID から Name に切り替え。未指定時は ID にフォールバック。
        phase: 13
        proposal: design/normalizer/schema-spec.md#title-キーワード-m4
      M5:
        title: query_deriver の正規化スコープを catalog 境界に揃える (段階 1)
        phase: 10
        done: true
      M6:
        title: blob marker 機構の導入 (内部 schema 専用、段階 2)
        note: |
          design/normalizer/normalizer.md「正規化スコープと catalog 境界」の
          段階 2。x-mood-blob: true 等のマーカーを導入し、build_schema_tree と
          normalize_data がそれを認識する形に拡張。query-schema.yaml の whereClause
          等にマーカーを付与し、M5 の ad-hoc 対応を marker 駆動に置き換える。
          schema-schema.yaml には触れない (user schema には未解放)。前提 M5。
        phase: 13
        proposal: design/normalizer/normalizer.md#正規化スコープと-catalog-境界-m5-m6-m7
      M7:
        title: user schema からの blob 型宣言の解放 (段階 3)
        note: |
          design/normalizer/normalizer.md「正規化スコープと catalog 境界」の
          段階 3。schema-schema.yaml に if/then で blob サブツリーを許容する
          ルールを追加し、__meta_entity / docs/reference/schema.md を更新。
          実需が surface してから着手。前提 M6。
        phase: 13
        proposal: design/normalizer/normalizer.md#正規化スコープと-catalog-境界-m5-m6-m7
      M8:
        title: derive_queries 出力を canonical 形式で流す
        phase: 10
        done: true

  N:
    title: レンダリング / 出力形式
    impl_paths:
      - src/another_mood/pipeline/adapters/
      - src/another_mood/components/generator/
    tasks:
      N1:
        title: Hugo 利用の見直しと代替 HTML Renderer / Live Server の導入
        phase: 13
      N2:
        title: HTML / Asciidoc / PlantUML ジェネレート対応
        phase: 13

  O:
    title: バグ修正
    impl_paths:
      - src/another_mood/components/preprocess/
      - src/another_mood/components/shared/
      - src/another_mood/components/generator/
      - src/another_mood/pipeline/
    tasks:
      O3:
        title: Windows での動作確認
        note: |
          利用者向け要件は design/architecture.md「動作環境」。
          Windows 実機で pytest / mood build / mood watch を検証済み。
        phase: 10
        done: true
      O4:
        title: インラインコードのフェンス長を動的に決める code_fence フィルタ
        note: |
          内蔵テンプレート (__meta_entity の attributes 表など) が任意
          Mapping を Markdown テーブルセルにダンプしているが、値にバック
          クォートが含まれるとフェンスが内側で早期終了してセルが崩れる。
          詳細仕様は design/generator/generator.md「インラインコードの
          フェンス長 (O4)」。
        phase: 13
        proposal: design/generator/generator.md#インラインコードのフェンス長-o4

  P:
    title: テンプレートエンジン拡張
    impl_paths:
      - src/another_mood/components/generator/mood_view_processor.py
      - src/another_mood/components/generator/template_engine.py
    spec: design/generator/template-spec.md
    tasks:
      P1:
        title: "{% mood_view %} タグの拡張文法"
        note: |
          現状は {% mood_view EXPR with EXPR %} 形式のみ対応。
          template-spec.md の例示で使われている以下 2 形式を追加する。
            - for 形式:    {% mood_view "NAME" for SEQ %}
            - filter 形式: {% mood_view NAME[id="..."] %}
        phase: 13

  Q:
    title: 公開
    impl_paths:
      - pyproject.toml
    tasks:
      Q1:
        title: PyPI 公開
        note: 詳細タスクは別途切り出す（ライセンス / README / メタデータ整備など）
        phase: 12

  R:
    title: ユーザドキュメント・サンプルプロジェクト改善
    impl_paths:
