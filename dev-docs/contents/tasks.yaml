categories:
  A:
    title: Markdown パーサー拡張
    impl_paths:
      - src/another_mood/components/preprocess/prose.py
      - src/another_mood/components/generator/
    spec: design/normalizer/markdown-parser-spec
    tasks:
      A1:
        title: "{#id} 付き見出しの検出"
        note: markdown-it-py の AST 走査
        phase: 13
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A2:
        title: セクション本文範囲の切り出し
        note: 次の同レベル以上の {#id} までを本文とする
        phase: 13
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A3:
        title: ファイル単位 + セクション単位のダブル出力
        note: 既存の parse_markdown 拡張
        phase: 13
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A4:
        title: セクション内見出しレベル正規化
        note: 最小レベルを H1 にシフト
        phase: 13
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A5:
        title: ソース内相対リンク → toc 記法への変換
        note: contents_dir 基点パス解決が必要。出力する anchor_path の形式は anchor-spec.md の規則に従う
        phase: 11
        proposal: design/normalizer/markdown-parser-spec.md#リンク正規化-a5
      A6:
        title: shiftHeadings(n) Jinja2 フィルタ
        note: テンプレート側で使用
        phase: 11
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6

  B:
    title: アンカー / リンク解決
    impl_paths:
      - src/another_mood/components/generator/
    spec: design/generator/anchor-spec
    tasks:
      B1:
        title: 親参照の注入 (`_parent` / `_parent_record`)
        note: anchor 可能な全 Mapping / Array ノードに親参照を生やす。Mapping のみ `_parent_record` を併設
        phase: 11
        done: true
      B2:
        title: anchor_path → ノード マップ構築
        note: full anchor_path をキーにしたフラットマップを wrap の 1 パスで構築 (`build_anchor_map`)。anchor フィルタおよび resolve フィルタが共有
        phase: 11
        done: true
      B3:
        title: ノードへの `_meta.anchor_path` / `_meta.object_type_id` 注入
        note: anchor-spec の規則に従って各ノードの anchor_path と object_type_id を計算し `_meta` に格納。`_parent` チェーンを使う lazy 評価
        phase: 11
        done: true
      B4:
        title: anchor 解決・整形フィルタ (`anchor` / `link` / `label` / `href`)
        note: '`anchor()` でアンカーパス/segments からアンカーを得て `link` / `label` / `href` が Markdown リンク / display text / URL を生成。source は `this`、resolver は静的 `(ReportsConfig, anchor_map)`'
        phase: 11
        done: true
      B5:
        title: prose body 処理フィルタ (`resolve`)
        note: body 内の `toc:` URL を実 URL に置換。pre-render 適用。見出しレベル正規化等の総合処理も担う想定 (具体は別途)
        phase: 11
        proposal: design/generator/generator.md#リンク解決-b4-b5
      B6:
        title: ページパスの導出 (ReportsConfig.page_path)
        note: page_path は (node, file_per) の関数なのでノードに焼かず ReportsConfig.page_path(node) に置く。非 root の分割対象は anchor_path 先頭 / を落とし .md、root は index.md、非分割対象は最寄りの分割境界に解決。レポートルート相対 (reports/・profile 段は書き出し側 C3 が付与)。木の遡上は data_tree の free function nearest_ancestor(node, match) に切り出し、消費は B4/C4
        phase: 11
        done: true
      B7:
        title: IRI エスケープ関数 (anchor_path / as_url の共通化)
        note: >-
          エスケープを IRI 形 (RFC 3987 ucschar 生通し) にする共通関数 url_escape を generator/url.py に実装し、
          data_tree の anchor_path 構築と md の as_url を差し替えた。関数名は方式 (IRI) でなく行き先 (URL) で命名。
          設計・根拠・検証は anchor-spec.md#escape-規則 を正本とする。C3 が依存。
        phase: 11
        done: true
      B8:
        title: リンク語彙の振り直し (anchor → node rename)
        note: >-
          テンプレート公開名 anchor → node、anchor_path フィルタ削除。内部は「実体 → node /
          住所文字列 → anchor_path / <a> 標識 → anchor」の原則で機械改名し、docs/reference/template.md を
          同期。出力はバイト同一のはずなので showcase / dev-docs のビルド出力一致で検証する。
          対応表は proposal の節を正本とする。
        phase: 11
        done: true
      B9:
        title: アンカー発行フィルタ (`| anchor`)
        note: >-
          ノードを受けて <a id="{anchor_path}"> を描画する受け側原始機能。href が常時付ける fragment の
          受け側 (契約の残り半分)。author が手書きレンダリングで手置きする。md 側 (OutputFormat.link_filters)。
          mood_view 自動刻印 (C9) がこれを再利用。設計は anchor-spec.md#アンカー発行フィルタ-b9--c9。
        phase: 11
        proposal: design/generator/anchor-spec.md#アンカー発行フィルタ-b9--c9

  C:
    title: ページ分割 (paging)
    impl_paths:
      - src/another_mood/components/generator/
      - src/another_mood/components/generator/mood_view_processor.py
    spec: design/generator/paging-spec
    tasks:
      C1:
        title: reports.yaml の読み込み・パース
        phase: 11
        done: true
      C2:
        title: file_per 設定の評価
        note: クラスが分割対象か判定 (ReportsConfig.is_split_target)
        phase: 11
        done: true
      C3:
        title: page_path を実ファイルへ適用
        note: >-
          実ツリーノードの mood_view は ReportsConfig.page_path(node) で anchor 由来パスに分割出力
          (reports/ 配下、導出は B6)。合成 dict (meta 診断) は暫定 fallback のまま (E12 で解消)。
          starter/music/japanese/dev-docs に file_per を設定し手書きリンクを anchor 由来パスへ調整。
          書き出し衝突は #258 の PageCollisionError が捕捉。
        phase: 11
        done: true
      C4:
        title: "{% mood_view %} の振る舞い分岐: 分割 vs インライン展開"
        note: >-
          主題ノードの object_type_id を file_per と照合し、含まれれば分割（呼び出し位置に何も残さない）・
          含まれなければインライン展開。親リンクは mood_view が出さず author が | link で別途書く
          (two-loop パターン)。判定は二段: 実ノード → file_per / 合成 dict (meta 診断) → 既定インライン、
          _split マーカーで分割 (template-keyed fallback 温存、E12 で解消)。
        phase: 11
        done: true
      C5:
        title: プロファイル別の出力ディレクトリ規約
        note: "{outDir}/{profile}/index.md"
        phase: 11
        proposal: design/generator/paging-spec.md#proposals
      C6:
        title: 複数プロファイルの並列ビルド
        phase: 11
        proposal: design/generator/paging-spec.md#proposals
      C7:
        title: FS-safe パス書き出しの堅牢化 (write 時例外 → 改名診断)
        note: >-
          IRI エスケープ (B7) で潰せない FS 固有問題 (パス長/予約名/末尾文字/正規化等) を、write 時の
          OSError → ユーザ改名診断で扱う。対象と方針は anchor-spec.md#escape-規則 を参照。優先度低。
        phase: 11
        proposal: design/generator/anchor-spec.md#escape-規則
      C8:
        title: inline キーワードの廃止
        note: >-
          file_per 機構導入後は型単位ポリシー (file_per から外す) でインライン意図を表現でき、
          inline keyword との併存は「file_per 対象を call-site で inline 強制 → ページと本文の二重出力」
          footgun を生む。starter の about-prose 1 箇所を file_per omission へ移行して廃止。
          設計判断は paging-spec.md#ページパスと出力ディレクトリ 直前の背景注を参照。
        phase: 11
        done: true
      C9:
        title: mood_view 自動アンカー刻印
        note: >-
          mood_view が描画ノードのアンカー (<a id="{anchor_path}">) を B9 の機能で自動発行
          (インラインはその場・分割はページ先頭)。two-loop パターンの同ページ内 fragment 着地を成立させる。
          B9 と C4 に依存。設計は anchor-spec.md#アンカー発行フィルタ-b9--c9。
        phase: 11
        proposal: design/generator/anchor-spec.md#アンカー発行フィルタ-b9--c9

  D:
    title: ユーザコンテンツバリデーション
    impl_paths:
      - src/another_mood/components/preprocess/normalizer.py
      - src/another_mood/components/preprocess/schema_inspector.py
      - src/another_mood/components/preprocess/
      - src/another_mood/resources/schemas/schema-schema.yaml
      - src/another_mood/config.py
      - src/another_mood/cli.py
    spec: design/normalizer/schema-spec
    tasks:
      D1:
        title: Meta-schema 拡張 — x-ref キーワードの受理
        phase: 10
        done: true
      D2:
        title: Schema-Inspector 拡張 — x-ref の収集
        phase: 10
        done: true
      D3:
        title: Schema-level コヒーレンスチェック
        phase: 10
        done: true
      D4:
        title: showcase/music への x-ref 適用
        phase: 10
        done: true
      D5:
        title: docs/reference 同期
        phase: 10
        done: true
      D6:
        title: Data-level FK 整合性検査
        phase: 10
        done: true
      D7:
        title: 警告インフラ
        phase: 10
        done: true
      D8:
        title: Unique 制約の仕様確定
        note: 宣言場所 / 複合キー対応の有無
        phase: 13
        proposal: design/normalizer/normalizer.md#unique-制約-d8-d9
      D9:
        title: Unique 制約の実装 + チェック
        note: --strict 連動
        phase: 13
        proposal: design/normalizer/normalizer.md#unique-制約-d8-d9

  E:
    title: YAML DSL クエリ評価拡充
    impl_paths:
      - src/another_mood/components/composer/query.py
      - src/another_mood/resources/schemas/
    spec: design/composer/queries-spec
    tasks:
      E1:
        title: where 句の仕様詰め + 実装
        phase: 10
        done: true
      E2:
        title: sort 句の仕様詰め + 実装
        phase: 10
        done: true
      E11:
        title: クエリ DSL 拡充前半 (flatten 句導入 + from 厳密化)
        phase: 10
        done: true
      E3:
        title: クエリ DSL 拡充後半 (join 句導入 + where 射程統一)
        phase: 10
        done: true
      E9:
        title: catalog データモデルの依存方向反転 (Node primary)
        phase: 10
        done: true
      E8:
        title: "`from:` パス解決の最長一致化"
        phase: 10
        done: true
      E6:
        title: クエリ名と正規化済みデータ名の同名禁止チェック
        note: |
          queries-spec.md「同名禁止」。現状は composer.py が sources[name] を
          silent に上書きするため、著者が気付かずにパススルーデータを
          上書きする事故が起きる。重複を検知してエラーにする。
        phase: 13
        proposal: design/composer/queries-spec.md#同名禁止-e6
      E10:
        title: singleton-flatten 内の object[] を child entity link として保持
        phase: 10
        done: true
      E12:
        title: meta 診断データの query 合成 (テンプレート内合成 dict の解消)
        note: >-
          meta 診断テンプレート (__meta_entity / __table_view / __meta_query) が __root.md 内で組む合成 dict を、
          query で実ノードとして合成しアンカーパスを持たせる。「同一 entity を複数テンプレートで複数ページ」=
          one-node-one-page 違反の確定負債で、F9 (出力の単一ディレクトリ集約) と同クラスタ。難所は walk_entity 相当
          (__definition.entities を live ビューへ entity.id 動的キーで reflective join) を query で表現すること。
          多段に分割して対応。paging 基盤が固まる C4/C5 後に着手。位置づけは
          paging-spec.md#meta-診断の分割--マーカー方式。
        phase: 11
        proposal: design/generator/paging-spec.md#meta-診断の分割--マーカー方式

  F:
    title: メタドキュメンテーション拡張
    impl_paths:
      - src/another_mood/resources/
      - src/another_mood/components/generator/
    spec: design/app/meta-documentation
    tasks:
      F4a:
        title: ER 図テンプレート — 全体図 + 基盤
        phase: 10
        done: true
      F4b:
        title: ER 図テンプレート — 近傍図
        phase: 10
        done: true
      F4c:
        title: ER 図テンプレート — per-query 図
        phase: 10
        done: true
      F7:
        title: メタドキュメンテーションテンプレートの Query 化リファクタ
        phase: 10
        done: true
      F8:
        title: __definition の自己記述カタログを built-in に追加
        phase: 10
        done: true
      F9:
        title: システムメタ出力を単一ディレクトリ配下に集約
        note: >-
          システム生成のメタドキュメント (__meta_entity / __table_view / __meta_query 等) を
          output/ 直下に横並びさせず、index.md (概要) を除いて一つのディレクトリ配下にまとめる。
          output/ 直下の見通しを良くし、利用者ツリーで __ ディレクトリが散らばらないようにする。
          ディレクトリ名・対象範囲は実装時に確定。C4 の template-keyed fallback (合成 dict 分割) が
          output 直下に散らす __xxx/ を所有・集約する、meta 負債クラスタ (C4 fallback → F9 → E12) の中間ステップ。
        phase: 13

  G:
    title: CLI / 設定システム
    impl_paths:
      - src/another_mood/cli.py
      - src/another_mood/config.py
    spec: design/app/config-spec
    tasks:
      G2:
        title: another-mood.config.json 読み込み
        note: config-spec.md
        phase: 13
        proposal: design/app/config-spec.md#設定ファイル-g2
      G3:
        title: render.customServer.command 対応
        note: config-spec.md
        phase: 13
        proposal: design/app/config-spec.md#rendercustomservercommand-g3
      G5:
        title: "mood watch --host: preview server の bind アドレス指定"
        phase: 10
        done: true
      G8:
        title: "<projectDir> / RB_* パスを CWD 配下に制限"
        note: |
          詳細は design/app/config-spec.md「処理対象ディレクトリの CWD 配下制約 (G8)」。
          現状は CWD 外の絶対パスを basename フォールバックで受け入れている。
        phase: 13
        proposal: design/app/config-spec.md#処理対象ディレクトリの-cwd-配下制約-g8

  H:
    title: バイナリファイルの取り扱い
    impl_paths:
      - src/another_mood/components/preprocess/normalizer.py
      - src/another_mood/components/composer/
      - src/another_mood/components/generator/
    spec: design/normalizer/normalizer
    tasks:
      H1:
        title: 仕様確定
        note: パス解決 / Composer への受け渡し / テンプレートからの参照方法
        phase: 13
        proposal: design/normalizer/normalizer.md#バイナリファイルの正規化-h1-h2
      H2:
        title: 実装
        phase: 13
        proposal: design/normalizer/normalizer.md#バイナリファイルの正規化-h1-h2
      H3:
        title: 散文サブシステムの一般化（媒体非依存化と `prose` 改名）
        note: |
          詳細は design/normalizer/normalizer.md「散文サブシステムの一般化 (H3)」。
          前提 H1, H2。
        phase: 13
        proposal: design/normalizer/normalizer.md#散文サブシステムの一般化-h3

  J:
    title: プラグインシステム
    impl_paths:
      - src/another_mood/
    tasks:
      J1:
        title: 計算機能プラグインの I/F 仕様検討
        note: 入出力 / 登録方法 / Composer か Generator のどこに挿すか
        phase: 13
      J2:
        title: サンプル実装で I/F 検証
        note: 例 — ファンクションポイント算出
        phase: 13

  L:
    title: dog-fooding リファクタ
    impl_paths:
      - dev-docs/contents/
      - dev-docs/definition/
    tasks:
      L1:
        title: 構造化データに振り替えられる箇所の棚卸し
        phase: 13
      L2:
        title: スキーマ + クエリ + テンプレート群の構築
        phase: 13
      L3:
        title: 実施過程で見つかったツールの不足を他カテゴリにフィードバック
        phase: 13

  M:
    title: JSON データモデル と データカタログ
    impl_paths:
      - src/another_mood/components/shared/json_data_model.py
      - src/another_mood/components/preprocess/schema_inspector.py
      - src/another_mood/components/shared/data_catalog.py
    spec: design/json-data-model
    tasks:
      M4:
        title: Entity Name の導入 (`title:` 由来の表示ラベル)
        note: 表示参照を Entity ID から Name に切り替え。未指定時は ID にフォールバック。
        phase: 13
        proposal: design/normalizer/schema-spec.md#title-キーワード-m4
      M5:
        title: query_deriver の正規化スコープを catalog 境界に揃える (段階 1)
        phase: 10
        done: true
      M6:
        title: blob marker 機構の導入 (内部 schema 専用、段階 2)
        note: |
          design/normalizer/normalizer.md「正規化スコープと catalog 境界」の
          段階 2。x-mood-blob: true 等のマーカーを導入し、build_schema_tree と
          normalize_data がそれを認識する形に拡張。query-schema.yaml の whereClause
          等にマーカーを付与し、M5 の ad-hoc 対応を marker 駆動に置き換える。
          schema-schema.yaml には触れない (user schema には未解放)。前提 M5。
        phase: 13
        proposal: design/normalizer/normalizer.md#正規化スコープと-catalog-境界-m5-m6-m7
      M7:
        title: user schema からの blob 型宣言の解放 (段階 3)
        note: |
          design/normalizer/normalizer.md「正規化スコープと catalog 境界」の
          段階 3。schema-schema.yaml に if/then で blob サブツリーを許容する
          ルールを追加し、__meta_entity / docs/reference/schema.md を更新。
          実需が surface してから着手。前提 M6。
        phase: 13
        proposal: design/normalizer/normalizer.md#正規化スコープと-catalog-境界-m5-m6-m7
      M8:
        title: derive_queries 出力を canonical 形式で流す
        phase: 10
        done: true

  N:
    title: レンダリング / 出力形式
    impl_paths:
      - src/another_mood/pipeline/adapters/
      - src/another_mood/components/generator/
    tasks:
      N1:
        title: Hugo 利用の見直しと代替 HTML Renderer / Live Server の導入
        phase: 13
      N2:
        title: HTML / Asciidoc / PlantUML ジェネレート対応
        phase: 13

  O:
    title: バグ修正
    impl_paths:
      - src/another_mood/components/preprocess/
      - src/another_mood/components/shared/
      - src/another_mood/components/generator/
      - src/another_mood/pipeline/
    tasks:
      O3:
        title: Windows での動作確認
        phase: 10
        done: true
      O4:
        title: インラインコードのフェンス長を動的に決める code_fence フィルタ
        note: |
          内蔵テンプレート (__meta_entity の attributes 表など) が任意
          Mapping を Markdown テーブルセルにダンプしているが、値にバック
          クォートが含まれるとフェンスが内側で早期終了してセルが崩れる。
          詳細仕様は design/generator/generator.md「インラインコードの
          フェンス長 (O4)」。
        phase: 13
        proposal: design/generator/generator.md#インラインコードのフェンス長-o4

  P:
    title: テンプレートエンジン拡張
    impl_paths:
      - src/another_mood/components/generator/mood_view_processor.py
      - src/another_mood/components/generator/template_engine.py
    spec: design/generator/template-spec
    tasks:
      P2:
        title: テンプレート参照の拡張子明示化
        note: |
          {% mood_view "name" %} 形式から {% mood_view "name.md" %} 形式へ
