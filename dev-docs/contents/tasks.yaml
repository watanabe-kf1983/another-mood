categories:
  A:
    title: Markdown パーサー拡張
    impl_paths:
      - src/another_mood/components/preprocess/prose.py
      - src/another_mood/components/generator/
    spec: design/normalizer/markdown-parser-spec.md
    tasks:
      A1:
        title: "{#id} 付き見出しの検出"
        note: markdown-it-py の AST 走査
        phase: 10
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A2:
        title: セクション本文範囲の切り出し
        note: 次の同レベル以上の {#id} までを本文とする
        phase: 10
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A3:
        title: ファイル単位 + セクション単位のダブル出力
        note: 既存の parse_markdown 拡張
        phase: 10
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A4:
        title: セクション内見出しレベル正規化
        note: 最小レベルを H1 にシフト
        phase: 10
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6
      A5:
        title: ソース内相対リンク → toc 記法への変換
        note: contents_dir 基点パス解決が必要 (B2 と連携)
        phase: 10
        proposal: design/normalizer/markdown-parser-spec.md#リンク正規化-a5
      A6:
        title: shiftHeadings(n) Jinja2 フィルタ
        note: テンプレート側で使用
        phase: 10
        proposal: design/normalizer/markdown-parser-spec.md#セクション単位抽出-a1-a4-a6

  B:
