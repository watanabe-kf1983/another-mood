  G:
    title: CLI / 設定システム
    impl_paths:
      - src/another_mood/cli.py
      - src/another_mood/config.py
    spec: 20-design/20-app/20-config-spec
    tasks:
      G2:
        title: another-mood.config.json 読み込み
        note: config-spec.md
        phase: 15
        proposal: 20-design/20-app/20-config-spec#設定ファイル-g2
      G3:
        title: render.customServer.command 対応
        note: config-spec.md
        phase: 15
        proposal: 20-design/20-app/20-config-spec#rendercustomservercommand-g3
      G5:
        title: "mood watch --host: preview server の bind アドレス指定"
        phase: 10
        done: true
      G8:
        title: "<projectDir> を CWD 配下に制限"
        note: >-
          <projectDir> が CWD 配下にあることを ProjectConfig.verify() が必須とし、
          CWD 外を指す場合 (絶対パス・相対 ../ 脱出の両方) はエラーで拒否する。出力キー
          .another-mood/<CWD 相対 projectDir>/ の前提を守るための制約で、旧 basename
          フォールバックの lossy な衝突を塞ぐ。out_dir / render_dir / tmp_dir・入力
          サブパスの RB_* 上書きは対象外。build / watch にのみ効く。
        phase: 13
        done: true
      G9:
        title: "mood watch / build の作業ディレクトリと出力 publish を隔離"
        note: >-
          作業 tmp はシステム temp へ隔離 (mkdtemp、build は成功 / UserError 失敗時に削除・
          内部エラー時のみ保持、watch は消さず OS 掃除に委ねる、RB_TMP_DIR で固定可)。
          publish は watch 既定で無し・--out-dir 指定時のみ md を publish (html は publish せず、
          build は不変)。これで watch 側 publish と build / 出力読み出しの衝突を構造的に解消。
        phase: 13
        done: true

  H:
    title: バイナリファイルの取り扱い
    impl_paths:
      - src/another_mood/components/preprocess/
      - src/another_mood/components/composer/
      - src/another_mood/components/generator/
    spec: 20-design/50-normalizer/10-normalizer
    tasks:
      H1:
        title: 仕様確定
        note: パス解決 / Composer への受け渡し / テンプレートからの参照方法
        phase: 13
        proposal: 20-design/50-normalizer/10-normalizer#バイナリファイルの取り扱い-h1-h4-h7
        done: true
      H4:
        title: blob レコード化とカタログ登録
        note: |
          旧 H2 (実装) の分割 1/4。normalize が YAML/MD 以外 (ドットファイル除外) を
          blob レコード化し、データカタログへ登録。確認は診断ビューと FK 検査。
        phase: 13
        proposal: 20-design/50-normalizer/10-normalizer#バイナリファイルの取り扱い-h1-h4-h7
        done: true
      H5:
        title: バイトの旅程 (generate 増分 sync + 下流貫通)
        note: |
          旧 H2 の分割 2/4。Hugo の .html 封じ・prepare_render プレースホルダ・
          出力パス衝突検査を含む。確認は build / watch 出力に実ファイルが並ぶこと。
        phase: 13
        proposal: 20-design/50-normalizer/10-normalizer#バイナリファイルの取り扱い-h1-h4-h7
      H6:
        title: リンク解決 (相対リンク → node:/blob → relink / href)
        note: |
          旧 H2 の分割 3/4。未解決参照検出を含む。確認は prose `![]()` 埋め込みが
          web / book 両 edition で表示されること。
        phase: 13
        proposal: 20-design/50-normalizer/10-normalizer#バイナリファイルの取り扱い-h1-h4-h7
      H7:
        title: showcase 仕上げ + docs 同期 + Proposals 整理
        note: |
          旧 H2 の分割 4/4。music ジャケット表示 (x-ref + テンプレート) で
          受け入れ確認を完遂。
        phase: 13
        proposal: 20-design/50-normalizer/10-normalizer#バイナリファイルの取り扱い-h1-h4-h7

