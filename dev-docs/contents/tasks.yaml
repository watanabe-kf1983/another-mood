  J:
    title: 外部計算連携
    impl_paths:
      - src/another_mood/
    tasks:
      J3:
        title: "外部計算とのデータ受け渡し境界の整備 (例: Function Point 算出の掲載)"
        note: >-
          計算機能そのものは提供しない —「mood build はユーザコードを実行しない」不変条件
          (J1/J2 プラグイン案の却下理由。Office マクロが後付けの既定ブロックに至った
