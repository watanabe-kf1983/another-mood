        phase: 13
        done: true

  N:
    title: レンダリング / 出力形式
    impl_paths:
      - src/another_mood/pipeline/adapters/
      - src/another_mood/components/generator/
    tasks:
      N1:
        title: Hugo 利用の見直しと代替 HTML Renderer / Live Server の導入
        note: >-
          カスタムレンダラ差し替えの構想 (旧 G3 render.customServer.command) はこの
          検討に吸収。現行は report / error 伝播まで Hugo と密結合で、設定値の
          差し替えで済む抽象は存在しない。
        phase: 18
      N2:
        title: HTML / Asciidoc / PlantUML ジェネレート対応
        phase: 18
      N3:
        title: "watch で捨てられる hugo_build をスキップ (レンダリング効率)"
        note: |
          watch は preview を hugo serve が tmp (prep_dir/data) から配信する一方、hugo_build の
          静的 html は publish しない限り誰も読まない (G9 で watch は既定 publish なし)。保存ごとに
          捨てられる full hugo build がリビルド遅延に乗る。ただし report / error 伝播が
          publish (upstream = hugo_build) を経由するため、単純に外すと連鎖が切れる。連鎖を
          reconcile 側へ張り替える等の再配線が要る。build は static html が成果物なので hugo_build を残す。
        phase: 18

  O:
    title: バグ修正
    impl_paths:
      - src/another_mood/components/preprocess/
      - src/another_mood/components/shared/
      - src/another_mood/components/generator/
      - src/another_mood/pipeline/
    tasks:
      O3:
        title: Windows での動作確認
        phase: 10
        done: true
      O4:
        title: インラインコードのフェンス長を動的に決める code_fence フィルタ
        phase: 11
        done: true

  P:
    title: テンプレートエンジン拡張
    impl_paths:
      - src/another_mood/components/generator/render_processor.py
      - src/another_mood/components/generator/template_engine.py
    spec: 20-design/70-generator/30-template-spec
    tasks:
      P2:
        title: テンプレート参照の拡張子明示化
        phase: 11
        done: true
      P3:
        title: render 主題の this 束縛 (ノード受け取り + ページ identity 安定化)
        phase: 11
        done: true
      P4:
        title: mood_view → render 改名 (静かなエイリアス併存)
        phase: 14
        done: true
      P5:
        title: mood_view エイリアス廃止
        note: >-
          稼働プロジェクトの移行完了後に mood_view エイリアスを撤去する。
          公開後の語彙に遺産を持ち込まないため、Q1 (PyPI 公開) 前に必ず畳む。
          前提 P4。
        phase: 14

  Q:
    title: 公開
    impl_paths:
      - pyproject.toml
      - dev-docs/
    tasks:
      Q1:
        title: PyPI 公開 (0.1.0 手動 publish)
        note: >-
          名前確保を兼ねた静かな初回公開 (告知・宣伝は Q3。PyPI に予約制度はなく、
          動く最小版を早めに上げるのが実質の名前確保)。手順は「PR merge → 即
          upload」の一続き: アカウントスコープ token を発行し、使い捨てシェルで
          `read -rs` → export → uv build && uv publish → シェル破棄 + 即 revoke。
          token はコマンドライン・history・Claude のセッションのいずれにも通さない。
          プロジェクトスコープ token は作らない (リリースフローは Q6 で
          trusted publishing に移り、以後 token 自体が不要になるため)。
          前提: Q2 / 移行措置を畳む P5, V7 / Q8, Q9, R2。
        phase: 14
      Q2:
        title: 作成ドキュメントと mood バージョンの互換性担保の仕組み
        phase: 14
        done: true
      Q3:
        title: 告知・宣伝を伴うローンチ
        note: >-
          Q1 は静かな公開に留め、S2-S4 (システム開発ドキュメント) の完成を待って
          告知する。内容 (告知先・訴求) は接近時に具体化。前提 Q4, Q5, Q7。
        phase: 17
      Q4:
        title: dev-docs の全面英語化
        note: >-
          ローンチで外部コントリビュータが設計判断を読める状態にする。
          background / design を英語へ移行し、DEVELOPMENT.md の「日本語」規約も改める。
          Phase 16 (S2-S4) は仕様検討で dev-docs に最も書き込むフェーズなので、
          その完了後・告知前に実施する。Q3 の前提。
        phase: 17
      Q5:
        title: 残タスクの GitHub Issues 移行 + ロードマップ退役
        note: >-
          Phase 18 以降の残タスクを GH Issues へ転記し、以後のタスク管理を Issues に
          一本化する。tasks.yaml / roadmap・tasks ビュー (L カテゴリの dog-fooding 成果物)
          はここで役割を終えて撤去。タスクの出し入れが止まり残りが backlog だけになる
          ローンチ直前が、転記コスト・鮮度とも最小。Q3 の前提。
        phase: 17
      Q6:
        title: リリース手順の明文化 (チェックリスト + バージョン運用)
        note: >-
          リリース全ステップの洗い出し、手動/自動の境界決定 (PR マージ側
          ゲート Q11 の実装形の捌き込み)、versioning 方式の選定 (B: hatch-vcs /
          C: 常時 .devN 仮宣言 — 選定理由の記録込み)、チェックリストの確定。
          契機・ブランチ運用・破壊的変更フラグ管理の決定済み事項と残論点は
          30-dev/50-release に集約済み。
          規模は 1 PR ではない — 着手時にブレイクダウンする。
        phase: 15
        proposal: 30-dev/50-release
      Q10:
        title: tag 駆動 publish ワークフロー (GH Actions + trusted publishing)
        note: >-
          チェックリスト (Q6) の自動側のうち publish 実行面: tag push 契機で
          build → PyPI publish (trusted publishing 登録込み) → GH Release +
          リリースノート自動生成 (.github/release.yml のラベル別節)。tag と
          pyproject の version 一致検証を含む (方式 B なら不要)。DoD =
          チェックリストに従い実リリースを 1 回回し、通った実態でチェック
          リストを確定する。前提 Q6, Q1。
        phase: 15
        proposal: 30-dev/50-release
      Q11:
        title: PR マージ側の破壊的変更ゲート
        note: >-
          破壊的変更がしれっとマージされるのを PR 時点で捕まえる追加プロセス。
          何かを置くことはほぼ確定、実装形 (ci.yml 検査 job / AI レビュー /
          pull_request_template.md / DEVELOPMENT.md の規律明文化、併用可) の
          捌きは Q6 で決める。機械検査の実装先は新規ワークフローではなく
          既存 ci.yml への追加を想定。前提 Q6。
        phase: 15
        proposal: 30-dev/50-release
      Q7:
        title: リポジトリの外部公開整備 (GH 設定 / CONTRIBUTING / changelog)
        note: >-
          外部に見られる前提のリポジトリ整備。branch protection 等の GH 設定、
          外部が読む changelog / リリースノートの体裁、メンテナンス期待値の明文化
          (as-is / no-SLA / fork 歓迎)。コントリビューションは積極受け入れしない方針
          — Issues は有効のまま放置・PR も放置・Dependabot は有効化しない。
          うるさくなったら (AI slop 等) そのとき対策を再考。
          `requires-python >=3.13` の広さも一度判断する (広げるか、最新版のみと宣言するか)。
          下限の実態: 3.13 要求は ntpath.isreserved の 1 箇所のみ (vendor すれば 3.12 化は安い)。
          PEP 695 構文 (type 文 / ジェネリクス) が広範にあり 3.12 が構文上の床。
          受益者が現れるローンチまで不要なので Phase 17。Q3 の前提。
        phase: 17
      Q8:
        title: PyPI アカウント準備 (登録 + 2FA)
        note: >-
          リポジトリ外・機長側の作業 (Claude には委任しない)。pypi.org に
          アカウント登録 (メール確認) と 2FA 設定 (全アップロード者に必須)。
          審査・承認プロセスはなく、作業・リードタイムとも 15 分程度。
          API token の発行は使い捨て運用のため publish 直前に行う (Q1 側)。
          Q1 の前提。
        phase: 14
      Q9:
        title: パッケージメタデータの最小整備 (LICENSE + pyproject)
        note: >-
          LICENSE ファイル (MIT) の追加と pyproject の license / urls。0.1.0 では
          最小に留め、classifiers / keywords / description 磨きはローンチ前
          (Phase 17) に回す。DoD にビルド成立確認を含める: uv build の wheel/sdist
          に resources/ (テンプレート・bundled docs・blueprint) が同梱され、
          showcase / テスト等の開発専用物が混入しないこと。twine check 通過。
          Q1 の前提。
        phase: 14

