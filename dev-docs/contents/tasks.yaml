categories:
  A:
    title: Markdown パーサー拡張
    impl_paths:
      - src/another_mood/components/preprocess/prose.py
      - src/another_mood/components/generator/
    spec: 20-design/50-normalizer/30-markdown-parser-spec
    tasks:
      A1:
        title: 見出し抽出 → prose.headings 生成
        note: prose body から見出しを採り headings リスト（{id, title, level}、id=github-slug で dedup、H1〜H6 全レベル）を生成。{#id} は使わず、FK 用の派生 entity も作らない。見出しリンクの妥当性は Generate で検証する
        phase: 12
        done: true
      A3:
        title: 見出しノードの anchor_path 構築（#-形）
        note: nested 見出しの anchor_path を /prose/X#slug に組む分岐。prose の /-例外の隣。# は構造的セパレータで escape しない
        phase: 12
        proposal: 20-design/70-generator/20-anchor-spec#見出しノード-a3-a4
      A4:
        title: 出力 URL fragment 規則の一般化 + 見出しは stamp しない
        note: "fragment = anchor_path の最後の `#` 以降（無ければ全体）。見出しは Goldmark/GitHub の native id に着地し自前では刻まない"
        phase: 12
        proposal: 20-design/70-generator/20-anchor-spec#見出しノード-a3-a4
      A5:
        title: ソース内相対リンク → node 記法への変換（基本）
        phase: 12
        done: true
      A6:
        title: under_heading フィルタ（見出し深さ調整）
        phase: 11
        done: true
      A7:
        title: "node 記法変換の `#fragment` 対応（見出しリンク）"
        note: "A5 の変換で `path.md#見出し-slug` の `#見出し-slug` を `node:` URI の fragment として素通し。見出しノード（A1, A3, A4）が解決可能になってから。fragment は再 slug せず素通し"
        phase: 12
        proposal: 20-design/50-normalizer/30-markdown-parser-spec#見出し-fragment-対応-a7

  B:
    title: アンカー / リンク解決
    impl_paths:
      - src/another_mood/components/generator/
    spec: 20-design/70-generator/20-anchor-spec
    tasks:
      B1:
        title: 親参照の注入 (`_parent` / `_parent_record`)
        phase: 11
        done: true
      B2:
        title: anchor_path → ノード マップ構築
        phase: 11
        done: true
      B3:
        title: ノードへの `_meta.anchor_path` / `_meta.object_type_id` 注入
        phase: 11
        done: true
      B4:
        title: anchor 解決・整形フィルタ (`anchor` / `link` / `label` / `href`)
        phase: 11
        done: true
      B5:
        title: prose body 処理フィルタ (`relink`)
        phase: 11
        done: true
      B6:
        title: ページパスの導出 (PagingPolicy.page_path)
        phase: 11
        done: true
      B7:
        title: IRI エスケープ関数 (anchor_path / as_url の共通化)
        phase: 11
        done: true
      B8:
        title: リンク語彙の振り直し (anchor → node rename)
        phase: 11
        done: true
      B9:
        title: アンカー発行フィルタ (`| anchor`)
        phase: 11
        done: true
      B10:
        title: 未解決リンク参照のビルドレポート警告 (link / resolve 共通)
        note: >-
          link / href (B4) と resolve (B5) は未解決参照 (MissingNode / 解決できない node: URL) を
          素テキストで可視化するのみで BuildReport には積まない。author が壊れた参照に気づけるよう、
          未解決参照を収集して D7 の警告インフラに載せ、ビルドレポートに出す。両フィルタ共通の経路で
          一度に扱う。現契約 (可視化はするが報告はしない) は anchor-spec.md#未解決参照の扱い。
          現状でも表示テキストは残り可視なので優先度低。
        phase: 15
        proposal: 20-design/70-generator/20-anchor-spec#未解決参照の扱い
      B11:
        title: node() のモード分離（位置=segments escape / path=verbatim を kwarg で surface）
        phase: 11
        done: true
      B12:
        title: mood_view を this の subtree 内に限定（描画はデータ位置に従う）
        note: "各ノードは page_path の 1 ページにだけ描かれる不変条件を、subject が this の子孫か（_parent 遡上の identity 判定）で強制。subtree 外への mood_view は split/inline 一律で file+line 付きビルドエラー。非ノード subject は免除（this 起点の描画をしない子テンプレに限り健全）。他所のノードは join で子孫化するか link で参照。設計は generator.md#リンク解決、実装は mood_view_processor.py の _guard_subtree docstring。"
        phase: 12
        done: true

  C:
    title: ページ分割 (paging)
    impl_paths:
      - src/another_mood/components/generator/
      - src/another_mood/components/generator/mood_view_processor.py
    spec: 20-design/70-generator/40-paging-spec
    tasks:
      C1:
        title: reports.yaml の読み込み・パース
        phase: 11
        done: true
      C2:
        title: file_per 設定の評価
        phase: 11
        done: true
      C3:
        title: page_path を実ファイルへ適用
        phase: 11
        done: true
      C4:
        title: "{% mood_view %} の振る舞い分岐: 分割 vs インライン展開"
        phase: 11
        done: true
      C5:
        title: edition 別の出力ディレクトリ規約
        note: "{outDir}/{edition}/index.md"
        phase: 12
        done: true
      C6:
        title: 複数 edition の並列ビルド
        phase: 12
        done: true
      C7:
        title: FS-safe パス書き出しの堅牢化 (write 時例外 → 改名診断)
        note: >-
          IRI エスケープ (B7) で潰せない FS 固有問題 (パス長/予約名/末尾文字/正規化等) を、write 時の
          OSError → ユーザ改名診断で扱う。対象と方針は anchor-spec.md#escape-規則 を参照。優先度低。
        phase: 13
        proposal: 20-design/70-generator/20-anchor-spec#escape-規則
      C8:
        title: inline キーワードの廃止
        phase: 11
        done: true
      C9:
        title: mood_view 自動アンカー刻印
        phase: 11
        done: true
      C10:
        title: meta 子テンプレへの root/entities threading 撤去
        phase: 11
        done: true
      C11:
        title: meta 主題の実ノード化 → _split マーカー撤去・page_path 一本化
        phase: 11
        done: true
      C12:
        title: render ループの一般化 (heterogeneous edition kinds を単一ループへ)
        phase: 12
        done: true

