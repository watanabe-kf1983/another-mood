          方針:
            - canonical は src/another_mood/resources/schemas/ のまま据え置き
              (behavioral artifact なのでコード側に留める)
            - docs/reference/schemas/*.yaml を mirror として git にコミット
              (sync 方向は src/ → docs/、一方向の build artifact 扱い)

          範囲:
            - sync 機構: make target もしくは pre-commit / hatch hook
            - docs/reference/{schema,query}.md の appendix を削除し、
              ./schemas/xxx-schema.yaml への相対リンクに置き換え
            - tests/test_docs_sync.py を「ファイル vs ファイル」に簡素化

          K2 の前提 (resources 公開対象を docs/ ツリーのみに収斂させるため)
          として K2 の前に着手する。
        phase: 9
        done: true
