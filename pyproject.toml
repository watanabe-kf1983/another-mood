[project]
name = "reqs-builder"
version = "0.1.0"
description = "A documentation build tool"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pydantic-settings>=2.13.1",
    "typer>=0.24.1",
    "watchfiles>=1.1.1",
]

[project.scripts]
reqs = "reqs_builder.entrypoints.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pyright",
    "pytest",
    "pytest-cov",
    "ruff>=0.15.7",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["reqs_builder"]
omit = ["src/reqs_builder/entrypoints/*"]

[tool.pyright]
typeCheckingMode = "strict"
