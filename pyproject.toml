[project]
name = "reqs-builder"
version = "0.1.0"
description = "A documentation build tool"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "filelock>=3.25.2",
    "hugo>=0.155.3",
    "jinja2>=3.1",
    "markdown-it-py>=4.0.0",
    "pydantic-settings>=2.13.1",
    "pyyaml>=6.0",
    "ruamel-yaml>=0.19.1",
    "typer>=0.24.1",
    "watchfiles>=1.1.1",
]

[project.scripts]
reqs = "reqs_builder.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "jsonschema>=4.26.0",
    "pre-commit>=4.5.1",
    "pyright",
    "pytest",
    "pytest-cov",
    "ruff>=0.15.7",
    "types-jsonschema>=4.26.0.20260325",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["reqs_builder.components"]
branch = true

[tool.pyright]
typeCheckingMode = "strict"
