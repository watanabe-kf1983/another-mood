name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - run: uv sync --locked

      - run: make ci

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-reports
          path: reports/
          retention-days: 30
