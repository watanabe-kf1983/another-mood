# Root entities (non-view, top-level) of the catalog.  Drives the
# Entity list and the per-entity __meta_entity / __table_view loops in
# the built-in __root template.
__entity_roots:
  from: __definition.entities
  where:
    view: false
    parent_entity: { exists: false }
  select:
    - item: id
    - item: builtin
    - item: item_type
