# Subject nodes for the per-query __queries pages.  One result item
# per catalog query (built-in queries included); the item's anchor path
# (/__queries/{id}) is the page path the built-in __root template
# splits it to.  Passthrough (no select) so each item carries the full
# query definition the __queries template renders (from / flatten /
# join / where / grouped / select).
__queries:
  from: __definition.queries
