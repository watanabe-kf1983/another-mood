# Built-in meta diagnostic queries.  Each top-level key is a view that
# powers an auto-generated diagnostic surface (the per-item pages, the
# index's Entity/Query lists, the ER diagram) describing the user's own
# schema, data, and queries.  All are scoped to user content:
# catalog-internal entities/queries (ids starting with `__`, e.g.
# __definition.*) are excluded so their internals do not clutter the
# output.

# Per-entity Entity Definition pages, and the index's Entity list.  Root
# content entities — user-authored plus user-facing built-ins like
# `prose`.  One result item per entity; its anchor path
# (/__entity_defs/{id}) is the page the built-in root template splits it
# to.  Parallel to __entity_data (same entity set, a distinct anchor root)
# so the definition and data views land on separate pages without a
# one-node-two-pages collision.
__entity_defs:
  from: __definition.entities
  where:
    view: false
    parent_entity: { exists: false }
    not:
      id: { startswith: __ }
  select:
    - item: id
    - item: builtin
    - item: item_type
  sort: { by: builtin }

# Per-entity Entity Data pages.  Same root content-entity set as
# __entity_defs, a distinct anchor root (/__entity_data/{id}) so the data
# view lands on its own page.
__entity_data:
  from: __definition.entities
  where:
    view: false
    parent_entity: { exists: false }
    not:
      id: { startswith: __ }
  select:
    - item: id

# Per-query meta pages, and the index's Queries list.  User-defined
# queries only.  Passthrough (no select) so each item carries the full
# query definition the query template renders (from / flatten / join /
# where / grouped / select); its anchor path (/__queries/{id}) is the page
# it splits to.
__queries:
  from: __definition.queries
  where:
    not:
      id: { startswith: __ }

# Node set for the built-in ER diagram on the index template.  Like
# __entity_defs but without the `parent_entity: { exists: false }` filter,
# so child entities like `artists.members` are included as nodes.  Not
# split to pages (absent from META_EDITION's file_per) — a pure
# helper feeding the diagram.
__entity_tree:
  from: __definition.entities
  where:
    view: false
    not:
      id: { startswith: __ }
  select:
    - item: id
    - item: parent_entity
    - item: builtin
    - item: item_type
