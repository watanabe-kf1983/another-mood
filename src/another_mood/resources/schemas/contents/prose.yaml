# Built-in prose schema — validates the structure produced by Markdown parsing.
#
# Markdown files in contents_dir are converted to this structure by the
# Normalizer's prose parser.  This schema is merged with user-defined
# schemas so that all content files are validated uniformly.
#
# See: dev-docs/contents/external/normalizer/markdown-parser-spec.md

schemas:
  prose:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: object
          properties:
            mime_type:
              type: string
            content:
              type: string
          required: [mime_type, content]
      required: [id, body]
