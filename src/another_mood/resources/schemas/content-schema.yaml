# Merged with the user's schema.yaml at validation time so that all
# content files are validated uniformly.

title: ContentSchema
description: >-
  Built-in schema that defines the `prose` and `blob` entities. Markdown
  files under contents_dir are parsed into prose records (id, title,
  content); every other file (dotfiles excluded) becomes a blob record
  (id, mime_type). Both are validated alongside the user's schema.yaml.

type: object
properties:
  blob:
    title: Blob collection
    description: >-
      Collection of blob records, one per opaque (non-YAML/Markdown) file
      in contents_dir, dotfiles and dotdirectories excluded. Each record
      names the file by id and MIME type; the bytes themselves stay out of
      the data model and are mirrored into each edition at generate time.
    type: array
    items:
      title: Blob record
      description: One opaque contents file, referenced by id.
      type: object
      properties:
        id:
          title: Blob id
          description: Contents-relative path of the file, extension included.
          type: string
        mime_type:
          title: Blob MIME type
          description: >-
            MIME type derived from the file extension, or
            `application/octet-stream` when unknown.
          type: string
      required: [id, mime_type]
  prose:
    title: Prose collection
    description: >-
      Collection of prose records, one per Markdown file in contents_dir.
      Each record carries the file's id, optional title, and content.
    type: array
    items:
      title: Prose record
      description: One Markdown file parsed into an id / title / content record.
      type: object
      properties:
        id:
          title: Prose id
          description: >-
            Stable identifier derived from the Markdown file's path
            (without extension).
          type: string
        title:
          title: Prose title
          description: >-
            Display title taken from the first H1 heading of the Markdown
            source. Absent when the source has no H1.
          type: string
        order_key:
          title: Prose order key
          description: >-
            Sort key for reading order, derived from the id: sorting prose
            records by this string yields folder pre-order (each folder's
            index first, then its subtree, contiguous).
          type: string
        depth:
          title: Prose outline depth
          description: >-
            Heading depth of the record in the folder outline, derived from
            the id (the root index is 1). A folder's index sits one level
            above its files.
          type: integer
        headings:
          title: Prose headings
          description: >-
            Headings found in the Markdown content, in document order, as
            link-target nodes. Each carries the GitHub-compatible slug of its
            text as `id` (deduplicated within the content), the heading text as
            `title`, and its `level` (1-6). A cross-document link to a heading
            resolves against these.
          type: array
          items:
            title: Prose heading
            description: One heading, a link target within the prose content.
            type: object
            properties:
              id:
                title: Heading id
                description: >-
                  GitHub-compatible slug of the heading text, matching the id
                  the renderer stamps on the heading. Deduplicated within the
                  content by a `-N` suffix.
                type: string
              title:
                title: Heading title
                description: Text of the heading.
                type: string
              level:
                title: Heading level
                description: Heading level, 1 (H1) through 6 (H6).
                type: integer
            required: [id, title, level]
        mime_type:
          title: Prose MIME type
          description: >-
            MIME type of the source (currently always `text/markdown`). A
            record-level header like a blob record's; the payload it tags is
            `content`.
          type: string
        content:
          title: Prose content
          description: >-
            Markdown source of the file. Relative links to other prose
            documents are normalized to their `node:` form
            (`[t](other.md)` → `[t](node:/prose/<id>)`); the template
            `relink` filter resolves these back to URLs.
          type: string
      required: [id, mime_type, content]
